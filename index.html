<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Le Braou — Pilotage interne</title>
<style>
:root {
  /* Palette officielle Camping Le Braou */
  --blue:      #24a8b4;   /* bleu Le Braou Canva */
  --blue-d:    #1a7d87;   /* bleu foncé */
  --blue-l:    #d4f1f4;   /* bleu très clair */
  --blue-m:    #5fc4cc;   /* bleu moyen */
  --green:     #2E7D52;   /* vert pin */
  --green-d:   #1B5438;
  --green-l:   #D4EDE1;
  --sand:      #F5F0E8;   /* sable */
  --sand-d:    #E8E0CC;
  --sand-dd:   #C8BCAA;
  --white:     #FFFFFF;
  --text:      #1C2B35;
  --text2:     #4A6375;
  --text3:     #8AA3B2;
  --warn:      #D4760A;
  --warn-l:    #FEF0DC;
  --warn-d:    #7C4205;
  --danger:    #C0392B;
  --danger-l:  #FDECEA;
  --danger-d:  #7B241C;
  --r: 10px; --rl: 16px; --rxl: 22px;
  --sh: 0 1px 4px rgba(36,168,180,.10);
  --shm: 0 4px 16px rgba(36,168,180,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--sand);color:var(--text);font-size:15px;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--sand-dd);border-radius:2px}
#app{min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* ── LOGIN ── */
#login-screen{background:linear-gradient(160deg,var(--blue-d) 0%,var(--blue) 50%,var(--blue-m) 100%);align-items:center;justify-content:center;padding:20px;min-height:100vh;overflow-y:auto}
.login-card{background:var(--white);border-radius:var(--rxl);padding:32px 28px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.25);margin:auto}
.login-logo{text-align:center;margin-bottom:22px}
.login-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-d) 100%);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 4px 12px rgba(36,168,180,.35)}
.login-icon svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.login-logo h1{font-size:21px;font-weight:700;color:var(--text)}
.login-logo p{font-size:13px;color:var(--text2);margin-top:2px}
.login-tabs{display:flex;background:var(--sand);border-radius:12px;padding:3px;margin-bottom:20px;gap:2px}
.login-tab{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text2);transition:all .15s}
.login-tab.active{background:var(--white);color:var(--blue);font-weight:600;box-shadow:var(--sh)}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--sand-d);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--text);background:var(--sand);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--blue);background:var(--white)}
.field-hint{font-size:12px;color:var(--text3);margin-top:4px}
.btn-main{width:100%;padding:13px;border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-d) 100%);color:#fff;transition:all .15s;box-shadow:0 3px 10px rgba(36,168,180,.35)}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(36,168,180,.4)}
.btn-main:active{transform:scale(.98)}
.login-err{display:none;background:var(--danger-l);color:var(--danger-d);font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:13px;border:1px solid #F5C6C2}

/* ── TOPBAR ── */
.topbar{background:linear-gradient(135deg,var(--blue-d) 0%,var(--blue) 100%);padding:0 16px;height:58px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-logo{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.topbar-logo-icon{width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.topbar-logo-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.role-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.3px}
.rb-admin{background:rgba(255,255,255,.25);color:#fff}
.rb-responsable{background:var(--green-l);color:var(--green-d)}
.rb-menage{background:rgba(255,255,255,.2);color:#fff}
.rb-technique{background:var(--warn-l);color:var(--warn-d)}
.topbar-name{font-size:13px;color:rgba(255,255,255,.8)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.btn-sm{font-size:12px;color:rgba(255,255,255,.8);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:5px 11px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-sm:hover{background:rgba(255,255,255,.25);color:#fff}

/* ── NAV ── */
.bottom-nav{background:var(--white);border-top:1.5px solid var(--sand-d);display:flex;position:sticky;bottom:0;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;transition:color .15s;font-weight:500}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.nav-btn.active{color:var(--blue)}
.nav-btn.active svg{stroke-width:2.3}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:16px;max-width:680px;margin:0 auto;width:100%}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-title{font-size:20px;font-weight:700;color:var(--text)}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* ── SEGMENT ── */
.seg{display:flex;background:var(--white);border-radius:12px;padding:3px;gap:2px;margin-bottom:14px;border:1.5px solid var(--sand-d)}
.seg-btn{flex:1;padding:9px;font-size:13px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:inherit;background:transparent;color:var(--text2);transition:all .15s}
.seg-btn.active{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-d) 100%);color:#fff;font-weight:600;box-shadow:0 2px 6px rgba(36,168,180,.3)}

/* ── ADD FORM ── */
.add-card{background:var(--white);border:1.5px solid var(--blue-l);border-radius:var(--rl);padding:15px;margin-bottom:14px;box-shadow:var(--sh)}
.add-card-title{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.form-area{width:100%;padding:10px 13px;border:1.5px solid var(--sand-d);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--text);background:var(--sand);resize:none;outline:none;transition:border-color .15s}
.form-area:focus{border-color:var(--blue);background:var(--white)}
.form-row{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.form-sel,.form-in{padding:9px 12px;border:1.5px solid var(--sand-d);border-radius:var(--r);font-family:inherit;font-size:13px;color:var(--text);background:var(--sand);outline:none;transition:border-color .15s}
.form-sel:focus,.form-in:focus{border-color:var(--blue)}
.form-in{flex:1;min-width:100px}
.btn-add{padding:9px 18px;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-d) 100%);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;box-shadow:0 2px 6px rgba(36,168,180,.3)}
.btn-add:hover{transform:translateY(-1px)}
.btn-add:active{transform:scale(.97)}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.fchip{padding:6px 13px;border-radius:20px;border:1.5px solid var(--sand-d);background:var(--white);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.fchip.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 6px rgba(36,168,180,.3)}
.cbadge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;border-radius:9px;font-size:11px;font-weight:700;padding:0 4px;margin-left:4px;background:var(--danger-l);color:var(--danger)}

/* ── TASK CARDS ── */
.tasks{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--white);border:1.5px solid var(--sand-d);border-radius:var(--rl);padding:13px 13px 11px;border-left:4px solid var(--sand-d);transition:all .2s;box-shadow:var(--sh)}
.task-card.p-urgent{border-left-color:var(--danger);background:#FFFAFA}
.task-card.p-high{border-left-color:var(--warn);background:#FFFDF7}
.task-card.p-normal{border-left-color:var(--blue)}
.task-card.is-done{opacity:.5}
.task-top{display:flex;align-items:flex-start;gap:10px}
.task-cb{width:20px;height:20px;margin-top:1px;flex-shrink:0;cursor:pointer;accent-color:var(--blue)}
.task-body{flex:1;min-width:0}
.task-txt{font-size:14px;color:var(--text);line-height:1.4;word-break:break-word}
.task-txt.struck{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:6px}
.pbadge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.2px}
.pb-urgent{background:var(--danger-l);color:var(--danger-d)}
.pb-high{background:var(--warn-l);color:var(--warn-d)}
.pb-normal{background:var(--blue-l);color:var(--blue-d)}
.pb-done{background:var(--sand-d);color:var(--text3)}
.task-agent{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
.agent-av{width:18px;height:18px;border-radius:50%;object-fit:cover;vertical-align:-4px;border:1px solid var(--sand-d)}
.task-time{font-size:11px;color:var(--text3)}
.task-actions{display:flex;align-items:center;gap:3px;margin-left:auto;flex-shrink:0}
.ibtn{background:none;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:7px;display:flex;align-items:center;transition:all .15s}
.ibtn:hover{background:var(--sand);color:var(--text)}
.ibtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.ibtn.danger:hover{color:var(--danger);background:var(--danger-l)}
.note-area{margin-top:9px;padding:9px 11px;background:var(--sand);border-radius:9px;border:1.5px solid var(--sand-d)}
.note-area textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--text);resize:none;outline:none}
.note-save{margin-top:5px;font-size:12px;padding:5px 13px;border-radius:7px;border:none;background:var(--blue);cursor:pointer;font-family:inherit;color:#fff;font-weight:600;transition:all .15s}
.note-save:hover{background:var(--blue-d)}
.note-disp{font-size:12px;color:var(--text2);font-style:italic;margin-top:8px;padding:8px 10px;background:var(--blue-l);border-radius:8px;border-left:3px solid var(--blue-m)}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.5;margin-bottom:12px;opacity:.35}
.empty p{font-size:14px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
.stat-card{background:var(--white);border:1.5px solid var(--sand-d);border-radius:var(--rl);padding:15px;box-shadow:var(--sh)}
.stat-lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:26px;font-weight:700;font-family:monospace;color:var(--blue)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.chart-card{background:var(--white);border:1.5px solid var(--sand-d);border-radius:var(--rl);padding:15px;margin-bottom:10px;box-shadow:var(--sh)}
.chart-title{font-size:13px;font-weight:700;margin-bottom:13px;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.bar-name{font-size:13px;color:var(--text2);width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--sand);border-radius:7px;overflow:hidden;border:1px solid var(--sand-d)}
.bar-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;min-width:22px;background:linear-gradient(90deg,var(--blue-m),var(--blue));color:#fff}
.bar-count{font-size:12px;color:var(--text3);width:34px;text-align:right;font-weight:600}
.tl-row{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--sand);border-radius:9px;margin-bottom:5px;border:1px solid var(--sand-d)}
.tl-agent{font-size:13px;font-weight:600;width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.tl-task{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-time{font-size:12px;font-weight:700;font-family:monospace}

/* ── EQUIPE ── */
.admin-sec{background:var(--white);border:1.5px solid var(--sand-d);border-radius:var(--rl);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.admin-sec-hd{padding:13px 15px;font-size:13px;font-weight:700;color:var(--text);border-bottom:1.5px solid var(--sand-d);display:flex;align-items:center;justify-content:space-between;background:var(--sand);text-transform:uppercase;letter-spacing:.5px}
.user-row{display:flex;align-items:center;gap:9px;padding:12px 15px;border-bottom:1.5px solid var(--sand);transition:background .15s}
.user-row:last-child{border-bottom:none}
.user-row:hover{background:var(--sand)}
.uav{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue-l),var(--blue-m));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue-d);flex-shrink:0;overflow:hidden;position:relative;cursor:pointer;border:2px solid var(--blue-l)}
.uav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.uav-ov{position:absolute;inset:0;background:rgba(36,168,180,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.uav:hover .uav-ov{opacity:1}
.uav-ov svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2}
.user-info{flex:1;min-width:0}
.user-name{font-size:14px;font-weight:600;color:var(--text)}
.user-email{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-sel{padding:6px 9px;border:1.5px solid var(--sand-d);border-radius:8px;font-family:inherit;font-size:12px;color:var(--text);background:var(--sand);cursor:pointer;outline:none;font-weight:500}
.role-sel:focus{border-color:var(--blue)}
.btn-ok{padding:7px 13px;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-d) 100%);color:#fff;border:none;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:600;box-shadow:0 2px 5px rgba(36,168,180,.3)}
.code-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1.5px solid var(--sand)}
.code-row:last-child{border-bottom:none}
.code-lbl{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.code-in{width:80px;padding:8px 10px;border:1.5px solid var(--sand-d);border-radius:8px;font-family:monospace;font-size:16px;letter-spacing:5px;text-align:center;outline:none;background:var(--sand);color:var(--text)}
.code-in:focus{border-color:var(--blue)}

/* ── PROFIL ── */
.profil-hero{background:linear-gradient(135deg,var(--blue-d) 0%,var(--blue) 100%);border-radius:var(--rl);padding:28px 20px;text-align:center;margin-bottom:14px;box-shadow:var(--shm)}
.profil-av{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;cursor:pointer;position:relative;margin:0 auto 14px;border:3px solid rgba(255,255,255,.4);transition:all .15s}
.profil-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profil-av-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.profil-av:hover .profil-av-ov{opacity:1}
.profil-av-ov svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}
.profil-name{font-size:19px;font-weight:700;color:#fff;margin-bottom:6px}
.profil-role-badge{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.3)}
.profil-card{background:var(--white);border:1.5px solid var(--sand-d);border-radius:var(--rl);padding:18px;margin-bottom:12px;box-shadow:var(--sh)}
.profil-card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.edit-row{display:flex;gap:8px;align-items:center}

/* ── TOAST ── */
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(16px);background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .22s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 12px rgba(36,168,180,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
#modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:10000;backdrop-filter:blur(2px)}
#modal-ov.show{display:block}
.modal-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--white);border-radius:var(--rl);padding:26px;width:300px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:7px;color:var(--text)}
.modal-msg{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px;word-break:break-word}
.modal-btns{display:flex;gap:9px}
.modal-cancel{flex:1;padding:11px;border:1.5px solid var(--sand-d);border-radius:var(--r);background:var(--sand);font-family:inherit;font-size:14px;cursor:pointer;color:var(--text2);font-weight:500}
.modal-confirm{flex:1;padding:11px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--danger),#A93226);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(192,57,43,.35)}

@media(min-width:640px){.main{padding:20px 24px}}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://www.campingaudenge.com/wp-content/uploads/2022/04/cropped-LOGO_BLANC_FD_BLEU_72DPI-1.png" alt="Camping Le Braou" style="width:140px;height:auto;margin-bottom:10px" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'"/>
      <div id="logo-fallback" style="display:none;width:64px;height:64px;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-d) 100%);border-radius:18px;align-items:center;justify-content:center;margin:0 auto 10px;box-shadow:0 4px 12px rgba(36,168,180,.35)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      </div>
      <h1>Camping Le Braou</h1>
      <p>Espace de pilotage interne</p>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="showLoginTab('connexion')">Se connecter</button>
      <button class="login-tab" onclick="showLoginTab('inscription')">Inscription</button>
    </div>
    <div id="login-err" class="login-err"></div>

<script>
var DATA_VERSION = '4';
var DEFAULT_CODES = { admin:'1234', responsable:'2345', menage:'3456', technique:'4567' };
var DEFAULT_USERS = [
  { id:'u1', nom:'Bryan', email:'bryan.briones33980@gmail.com', password:'admin123', role:'admin', photo:null }
];

var USERS=[], TASKS={ menage:[], technique:[] }, CODES={};
var currentUser=null, currentPage='tasks', currentModule='menage', currentFilter='todo';
var noteOpen={}, photoTarget=null, _modalCb=null;

function save() {
  try {
    var light = USERS.map(function(u){ return {id:u.id,nom:u.nom,email:u.email,password:u.password,role:u.role,photo:null}; });
    localStorage.setItem('cp_v', DATA_VERSION);
    localStorage.setItem('cp_users', JSON.stringify(light));
    localStorage.setItem('cp_tasks', JSON.stringify(TASKS));
    localStorage.setItem('cp_codes', JSON.stringify(CODES));
    var ph={}; USERS.forEach(function(u){ if(u.photo) ph[u.id]=u.photo; });
    localStorage.setItem('cp_photos', JSON.stringify(ph));
  } catch(e){}
}

function load() {
  try {
    if (localStorage.getItem('cp_v') !== DATA_VERSION) {
      localStorage.clear();
      USERS=JSON.parse(JSON.stringify(DEFAULT_USERS));
      TASKS={menage:[],technique:[]};
      CODES=JSON.parse(JSON.stringify(DEFAULT_CODES));
      save(); return;
    }
    var u=localStorage.getItem('cp_users'), t=localStorage.getItem('cp_tasks'), c=localStorage.getItem('cp_codes'), p=localStorage.getItem('cp_photos');
    USERS = u?JSON.parse(u):JSON.parse(JSON.stringify(DEFAULT_USERS));
    TASKS = t?JSON.parse(t):{menage:[],technique:[]};
    CODES = c?JSON.parse(c):JSON.parse(JSON.stringify(DEFAULT_CODES));
    if(p){ var ph=JSON.parse(p); USERS.forEach(function(u){ if(ph[u.id]) u.photo=ph[u.id]; }); }
  } catch(e) {
    USERS=JSON.parse(JSON.stringify(DEFAULT_USERS));
    TASKS={menage:[],technique:[]};
    CODES=JSON.parse(JSON.stringify(DEFAULT_CODES));
  }
}

window.addEventListener('DOMContentLoaded', function() {
  load();
  document.getElementById('l-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('r-code').addEventListener('keydown', function(e){ if(e.key==='Enter') doRegister(); });
});

function showLoginTab(tab) {
  document.getElementById('tab-connexion').style.display  = tab==='connexion'?'block':'none';
  document.getElementById('tab-inscription').style.display = tab==='inscription'?'block':'none';
  document.querySelectorAll('.login-tab').forEach(function(b,i){ b.classList.toggle('active',(i===0&&tab==='connexion')||(i===1&&tab==='inscription')); });
  document.getElementById('login-err').style.display='none';
}

function updateCodeHint() {
  var role=document.getElementById('r-role').value;
  var lbl={admin:'Admin',responsable:'Responsable',menage:'Ménage',technique:'Technique'};
  document.getElementById('code-hint').textContent='Code '+lbl[role]+' — demandez-le à votre responsable';
}

function showErr(msg) {
  var el=document.getElementById('login-err');
  el.textContent=msg; el.style.display='block';
}

function doLogin() {
  var email=document.getElementById('l-email').value.trim().toLowerCase();
  var pass=document.getElementById('l-pass').value;
  document.getElementById('login-err').style.display='none';
  if(!email||!pass){ showErr('Remplissez tous les champs.'); return; }
  var user=USERS.find(function(u){ return u.email.toLowerCase()===email&&u.password===pass; });
  if(!user){ showErr('Email ou mot de passe incorrect.'); return; }
  currentUser=user; showApp();
}

function doRegister() {
  var nom=document.getElementById('r-nom').value.trim();
  var email=document.getElementById('r-email').value.trim().toLowerCase();
  var pass=document.getElementById('r-pass').value;
  var role=document.getElementById('r-role').value;
  var code=document.getElementById('r-code').value.trim();
  document.getElementById('login-err').style.display='none';
  if(!nom||!email||!pass||!code){ showErr('Remplissez tous les champs.'); return; }
  if(pass.length<6){ showErr('Mot de passe trop court (min. 6 caractères).'); return; }
  if(code!==CODES[role]){ showErr('Code incorrect pour ce rôle.'); return; }
  if(USERS.find(function(u){ return u.email.toLowerCase()===email; })){ showErr('Email déjà utilisé.'); return; }
  var newUser={id:'u'+Date.now(),nom:nom,email:email,password:pass,role:role,photo:null};
  USERS.push(newUser); save(); currentUser=newUser; showApp();
}

function doLogout() {
  currentUser=null; currentPage='tasks'; currentModule='menage';
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('l-email').value='';
  document.getElementById('l-pass').value='';
  showLoginTab('connexion');
}

function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('main-screen').classList.add('active');
  updateTopbar(); buildNav(); navigateTo('tasks');
}

function updateTopbar() {
  document.getElementById('tb-name').textContent=currentUser.nom;
  var b=document.getElementById('tb-badge');
  var lbl={admin:'Admin',responsable:'Responsable',menage:'Ménage',technique:'Technique'};
  b.textContent=lbl[currentUser.role]||currentUser.role;
  b.className='role-badge rb-'+currentUser.role;
}

function buildNav() {
  var role=currentUser.role;
  var pages=[{id:'tasks',label:'Tâches',icon:'list'}];
  if(role==='admin'||role==='responsable') pages.push({id:'stats',label:'Suivi',icon:'chart'});
  pages.push({id:'equipe',label:'Équipe',icon:'users'});
  var icons={
    list:'<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
    chart:'<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    users:'<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
  };
  document.getElementById('bottom-nav').innerHTML=pages.map(function(p){
    return '<button class="nav-btn" id="nav-'+p.id+'" onclick="navigateTo(\''+p.id+'\')">'+icons[p.icon]+'<span>'+p.label+'</span></button>';
  }).join('');
}

function navigateTo(page) {
  currentPage=page;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn=document.getElementById('nav-'+page);
  if(btn) btn.classList.add('active');
  noteOpen={};
  render();
}

function render() {
  var el=document.getElementById('main-content');
  if(currentPage==='tasks')  el.innerHTML=renderTasks();
  if(currentPage==='stats')  el.innerHTML=renderStats();
  if(currentPage==='equipe') el.innerHTML=renderEquipe();
  if(currentPage==='profil') el.innerHTML=renderProfil();
}

function renderTasks() {
  var role=currentUser.role;
  var canAdd=role==='admin'||role==='responsable';
  var canDel=role==='admin'||role==='responsable';
  var all=TASKS[currentModule];
  var filtered=getFiltered();
  var counts={
    urgent:all.filter(function(t){ return t.priorite==='urgent'&&!t.done; }).length,
    done:all.filter(function(t){ return t.done; }).length
  };
  var h='<div class="page-hd"><div><div class="page-title">'+(currentModule==='menage'?'🧹 Ménage & Nettoyage':'🔧 Maintenance Technique')+'</div>';
  h+='<div class="page-sub">'+all.filter(function(t){return!t.done;}).length+' en cours</div></div></div>';
  h+='<div class="seg">';
  h+='<button class="seg-btn '+(currentModule==='menage'?'active':'')+'" onclick="switchMod(\'menage\')">Ménage</button>';
  h+='<button class="seg-btn '+(currentModule==='technique'?'active':'')+'" onclick="switchMod(\'technique\')">Technique</button>';
  h+='</div>';
  if(canAdd){
    h+='<div class="add-card"><div class="add-card-title">+ Nouvelle tâche</div>';
    h+='<textarea class="form-area" id="task-input" rows="2" placeholder="Décrire la tâche…"></textarea>';
    h+='<div class="form-row">';
    h+='<select class="form-sel" id="prio-sel"><option value="normal">🟢 Normal</option><option value="high">🟠 Urgent</option><option value="urgent">🔴 Très urgent</option></select>';
    h+='<select class="form-sel" id="agent-sel">'+USERS.map(function(u){ return '<option value="'+u.id+'">'+u.nom+'</option>'; }).join('')+'</select>';
    h+='<button class="btn-add" onclick="addTask()">Ajouter</button></div></div>';
  }
  h+='<div class="filters">';
  h+='<div class="fchip '+(currentFilter==='todo'?'active':'')+'" onclick="setFilter(\'todo\')">En cours</div>';
  h+='<div class="fchip '+(currentFilter==='urgent'?'active':'')+'" onclick="setFilter(\'urgent\')">Très urgent'+(counts.urgent?'<span class="cbadge">'+counts.urgent+'</span>':'')+'</div>';
  h+='<div class="fchip '+(currentFilter==='done'?'active':'')+'" onclick="setFilter(\'done\')">Terminées'+(counts.done?'<span class="cbadge" style="background:var(--sand-d);color:var(--text2)">'+counts.done+'</span>':'')+'</div>';
  h+='</div>';
  h+='<div class="tasks">';
  if(!filtered.length){
    h+='<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg><p>Aucune tâche ici</p></div>';
  } else {
    filtered.forEach(function(t){ h+=renderTask(t,canDel); });
  }
  h+='</div>';
  return h;
}

function renderTask(t, canDel) {
  var plbl={urgent:'Très urgent',high:'Urgent',normal:'Normal'}[t.priorite]||t.priorite;
  var pcls={urgent:'pb-urgent',high:'pb-high',normal:'pb-normal'}[t.priorite]||'';
  var ago=timeAgo(t.created_at);
  var dur=(t.done&&t.done_at)?' · '+formatDur(t.done_at-t.created_at):'';
  var agent=USERS.find(function(u){ return u.id===t.agent_id; });
  var agentName=agent?agent.nom:(t.agent_name||'?');
  var agentAv=agent&&agent.photo?'<img class="agent-av" src="'+agent.photo+'" alt=""/>':'👤';
  var noteHtml='';
  if(noteOpen[t.id]){
    noteHtml='<div class="note-area"><textarea id="note-'+t.id+'" rows="2" placeholder="Note…">'+(t.note||'')+'</textarea><button class="note-save" onclick="saveNote(\''+t.id+'\')">Enregistrer</button></div>';
  } else if(t.note){
    noteHtml='<div class="note-disp">💬 '+t.note+'</div>';
  }
  var h='<div class="task-card p-'+t.priorite+(t.done?' is-done':'')+'"><div class="task-top">';
  h+='<input type="checkbox" class="task-cb" '+(t.done?'checked':'')+' onchange="toggleDone(\''+t.id+'\')" />';
  h+='<div class="task-body"><div class="task-txt'+(t.done?' struck':'')+'">'+t.texte+'</div>';
  h+='<div class="task-meta"><span class="pbadge '+(t.done?'pb-done':pcls)+'">'+(t.done?'✓ Terminée':plbl)+'</span>';
  h+='<span class="task-agent">'+agentAv+' '+agentName+'</span>';
  h+='<span class="task-time">'+ago+dur+'</span></div>'+noteHtml+'</div>';
  h+='<div class="task-actions">';
  h+='<button class="ibtn" onclick="toggleNote(\''+t.id+'\')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg></button>';
  if(canDel) h+='<button class="ibtn danger" onclick="deleteTask(\''+t.id+'\')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>';
  h+='</div></div></div>';
  return h;
}

function renderStats() {
  var all=TASKS.menage.concat(TASKS.technique);
  var done=all.filter(function(x){ return x.done; });
  var wt=done.filter(function(x){ return x.done_at; });
  var avg=wt.length?wt.reduce(function(s,x){ return s+(x.done_at-x.created_at); },0)/wt.length:0;
  var am={};
  all.forEach(function(t){
    var k=t.agent_id||'?';
    var n=(USERS.find(function(u){ return u.id===t.agent_id; })||{}).nom||t.agent_name||'?';
    if(!am[k]) am[k]={nom:n,done:0,total:0};
    am[k].total++; if(t.done) am[k].done++;
  });
  var agents=Object.values(am).sort(function(a,b){ return b.total-a.total; });
  var maxT=Math.max.apply(null,agents.map(function(a){ return a.total; }).concat([1]));
  var recent=wt.sort(function(a,b){ return b.done_at-a.done_at; }).slice(0,6);
  var h='<div class="page-hd"><div class="page-title">📊 Tableau de bord</div></div>';
  h+='<div class="stats-grid">';
  h+='<div class="stat-card"><div class="stat-lbl">Total</div><div class="stat-val">'+all.length+'</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">Terminées</div><div class="stat-val">'+done.length+'</div><div class="stat-sub">'+(all.length?Math.round(done.length/all.length*100):0)+'%</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">En cours</div><div class="stat-val">'+(all.length-done.length)+'</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">Urgentes</div><div class="stat-val" style="color:var(--danger)">'+all.filter(function(x){return x.priorite==='urgent'&&!x.done;}).length+'</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">Délai moyen</div><div class="stat-val" style="font-size:18px">'+(avg?formatDur(avg):'—')+'</div></div>';
  h+='</div>';
  h+='<div class="chart-card"><div class="chart-title">Par agent</div>';
  if(!agents.length){ h+='<p style="font-size:13px;color:var(--text3)">Aucune donnée</p>'; }
  else agents.forEach(function(a){
    var pct=Math.round(a.done/a.total*100), w=Math.round(a.done/maxT*100);
    h+='<div class="bar-row"><div class="bar-name">'+a.nom+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%">'+(pct>15?pct+'%':'')+'</div></div><div class="bar-count">'+a.done+'/'+a.total+'</div></div>';
  });
  h+='</div>';
  h+='<div class="chart-card"><div class="chart-title">Délais récents</div>';
  if(!recent.length){ h+='<p style="font-size:13px;color:var(--text3)">Aucune tâche terminée</p>'; }
  else recent.forEach(function(x){
    var d=x.done_at-x.created_at, col=d<1800000?'var(--green)':d<7200000?'var(--warn)':'var(--danger)';
    var n=(USERS.find(function(u){ return u.id===x.agent_id; })||{}).nom||'?';
    h+='<div class="tl-row"><div class="tl-agent">'+n+'</div><div class="tl-task">'+x.texte+'</div><div class="tl-time" style="color:'+col+'">'+formatDur(d)+'</div></div>';
  });
  h+='</div>';
  return h;
}

function renderEquipe() {
  var isAdmin=currentUser.role==='admin';
  var h='<div class="page-hd"><div class="page-title">👥 Équipe</div></div>';
  h+='<div class="admin-sec"><div class="admin-sec-hd"><span>Membres ('+USERS.length+')</span>';

    h+='<div class="uav" onclick="triggerPhoto(\''+u.id+'\')">'+av+'</div>';

    h+='<div class="user-email">'+u.email+'</div></div>';
    if(isAdmin){
      h+='<select class="role-sel" id="role-'+u.id+'">';

      h+='<option value="responsable" '+(u.role==='responsable'?'selected':'')+'>Responsable</option>';
      h+='<option value="menage" '+(u.role==='menage'?'selected':'')+'>Ménage</option>';
      h+='<option value="technique" '+(u.role==='technique'?'selected':'')+'>Technique</option>';
      h+='</select>';
      h+='<button class="btn-ok" onclick="saveRole(\''+u.id+'\')">OK</button>';
      if(!isSelf) h+='<button class="ibtn danger" onclick="deleteUser(\''+u.id+'\')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>';
    } else {
      h+='<span class="role-badge '+rbcls[u.role]+'" style="font-size:11px">'+(lbl[u.role]||u.role)+'</span>';
    }
    h+='</div>';
  });
  h+='<p style="font-size:11px;color:var(--text3);padding:8px 15px 12px">Touchez un avatar pour changer la photo</p></div>';
  if(isAdmin){
    h+='<div class="admin-sec"><div class="admin-sec-hd">Codes d\'accès par rôle</div><div style="padding:14px 15px">';
    [{k:'admin',l:'Admin'},{k:'responsable',l:'Responsable'},{k:'menage',l:'Ménage'},{k:'technique',l:'Technique'}].forEach(function(r){
      h+='<div class="code-row"><div class="code-lbl">'+r.l+'</div>';
      h+='<input class="code-in" type="text" id="code-'+r.k+'" value="'+CODES[r.k]+'" maxlength="4" inputmode="numeric"/>';
      h+='<button class="btn-ok" onclick="saveCode(\''+r.k+'\')">OK</button></div>';
    });
    h+='</div></div>';
    h+='<div class="admin-sec"><div class="admin-sec-hd">Ajouter un membre</div><div style="padding:14px 15px;display:flex;flex-direction:column;gap:10px">';
    h+='<input class="form-area" id="new-nom" placeholder="Prénom et nom" style="resize:none"/>';
    h+='<input class="form-area" id="new-email" placeholder="Email" type="email" style="resize:none"/>';
    h+='<input class="form-area" id="new-pass" placeholder="Mot de passe provisoire" type="password" style="resize:none"/>';
    h+='<select class="form-sel" id="new-role" style="width:100%"><option value="menage">Ménage</option><option value="technique">Technique</option><option value="responsable">Responsable</option><option value="admin">Admin</option></select>';
    h+='<button class="btn-add" onclick="addUser()" style="width:100%;justify-content:center;padding:11px">Créer le compte</button>';
    h+='</div></div>';
  }
  return h;
}

function renderProfil() {
  var u=currentUser;
  var av=u.photo?'<img src="'+u.photo+'" alt=""/><div class="profil-av-ov"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2l2-3h10l2 3a2 2 0 0 0 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>':'<span>'+u.nom.slice(0,2).toUpperCase()+'</span><div class="profil-av-ov"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2l2-3h10l2 3a2 2 0 0 0 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>';
  var lbl={admin:'Admin',responsable:'Responsable',menage:'Ménage',technique:'Technique'};
  var h='<div class="page-hd"><div class="page-title">Mon profil</div></div>';
  h+='<div class="profil-hero"><div class="profil-av" onclick="triggerPhoto(\''+u.id+'\')">'+av+'</div>';
  h+='<div class="profil-name">'+u.nom+'</div>';
  h+='<div class="profil-role-badge">'+(lbl[u.role]||u.role)+'</div></div>';
  h+='<div class="profil-card"><div class="profil-card-title">Modifier mes informations</div>';
  h+='<div class="field"><label>Mon nom</label><div class="edit-row"><input class="form-in" id="edit-nom" value="'+u.nom+'" style="background:var(--sand);border:1.5px solid var(--sand-d)"/><button class="btn-ok" onclick="saveName()">OK</button></div></div>';
  h+='<div class="field" style="margin-bottom:0"><label>Email</label><div style="font-size:14px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--sand-d)">'+u.email+'</div></div>';
  h+='</div>';
  return h;
}

// ACTIONS
function getFiltered() {
  var t=TASKS[currentModule];
  if(currentFilter==='todo') return t.filter(function(x){ return !x.done; });
  if(currentFilter==='done') return t.filter(function(x){ return x.done; });
  if(currentFilter==='urgent') return t.filter(function(x){ return x.priorite==='urgent'&&!x.done; });
  return t;
}
function addTask() {
  var txt=document.getElementById('task-input').value.trim();
  var prio=document.getElementById('prio-sel').value;
  var aid=document.getElementById('agent-sel').value;
  if(!txt){ toast('Décrivez la tâche'); return; }
  TASKS[currentModule].unshift({id:'t'+Date.now(),texte:txt,priorite:prio,agent_id:aid,done:false,note:'',created_at:Date.now(),done_at:null});
  save(); toast('Tâche ajoutée ✓'); render();
}
function toggleDone(id) {
  var t=findTask(id); if(!t) return;
  t.done=!t.done; t.done_at=t.done?Date.now():null;
  save(); toast(t.done?'✓ Terminée !':'Remise en cours'); render();
}
function deleteTask(id) {
  var t=findTask(id); if(!t) return;
  showModal('Supprimer cette tâche ?',t.texte.slice(0,80)+(t.texte.length>80?'…':''),function(){
    TASKS.menage=TASKS.menage.filter(function(x){ return x.id!==id; });
    TASKS.technique=TASKS.technique.filter(function(x){ return x.id!==id; });
    save(); toast('Tâche supprimée'); render();
  });
}
function toggleNote(id) {
  noteOpen[id]=!noteOpen[id]; render();
  if(noteOpen[id]) setTimeout(function(){ var el=document.getElementById('note-'+id); if(el) el.focus(); },50);
}
function saveNote(id) {
  var t=findTask(id), el=document.getElementById('note-'+id);
  if(t&&el){ t.note=el.value; save(); }
  noteOpen[id]=false; toast('Note enregistrée'); render();
}
function switchMod(m){ currentModule=m; currentFilter='todo'; render(); }
function setFilter(f){ currentFilter=f; render(); }
function findTask(id){ return TASKS.menage.find(function(t){ return t.id===id; })||TASKS.technique.find(function(t){ return t.id===id; }); }

function saveRole(uid) {
  var sel=document.getElementById('role-'+uid), u=USERS.find(function(x){ return x.id===uid; });
  if(u&&sel){ u.role=sel.value; if(currentUser.id===uid){ currentUser.role=u.role; updateTopbar(); buildNav(); } save(); toast('Rôle mis à jour'); render(); }
}
function deleteUser(uid) {
  var u=USERS.find(function(x){ return x.id===uid; }); if(!u) return;
  if(uid===currentUser.id){ toast('Impossible de se supprimer'); return; }
  var nom=u.nom;
  showModal('Supprimer '+nom+' ?','Le compte de '+nom+' sera définitivement supprimé.',function(){
    USERS=USERS.filter(function(x){ return x.id!==uid; });
    save(); toast(nom+' supprimé(e)'); render();
  });
}
function addUser() {
  var nom=document.getElementById('new-nom').value.trim();
  var email=document.getElementById('new-email').value.trim().toLowerCase();
  var pass=document.getElementById('new-pass').value;
  var role=document.getElementById('new-role').value;
  if(!nom||!email||!pass){ toast('Remplissez nom, email et mot de passe'); return; }
  if(USERS.find(function(u){ return u.email.toLowerCase()===email; })){ toast('Email déjà utilisé'); return; }
  USERS.push({id:'u'+Date.now(),nom:nom,email:email,password:pass,role:role,photo:null});
  save(); toast(nom+' ajouté(e) ✓'); render();
}
function saveCode(role) {
  var el=document.getElementById('code-'+role); if(!el) return;
  var val=el.value.trim();
  if(val.length!==4||isNaN(val)){ toast('Code = 4 chiffres'); return; }
  CODES[role]=val; save(); toast('Code mis à jour ✓');
}
function saveName() {
  var el=document.getElementById('edit-nom'); if(!el) return;
  var val=el.value.trim(); if(!val){ toast('Nom vide'); return; }
  currentUser.nom=val;
  var u=USERS.find(function(x){ return x.id===currentUser.id; });
  if(u) u.nom=val;
  save(); updateTopbar(); toast('Nom mis à jour ✓'); render();
}
function triggerPhoto(uid){ photoTarget=uid; document.getElementById('photo-input').value=''; document.getElementById('photo-input').click(); }
function handlePhoto(event) {
  var file=event.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var c=document.createElement('canvas'); c.width=80; c.height=80;
      var ctx=c.getContext('2d'), s=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,80,80);
      var data=c.toDataURL('image/jpeg',.75);
      var u=USERS.find(function(x){ return x.id===photoTarget; });
      if(u){ u.photo=data; if(currentUser.id===u.id) currentUser.photo=data; save(); toast('Photo mise à jour ✓'); render(); }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function showModal(title,msg,cb){ document.getElementById('modal-title').textContent=title; document.getElementById('modal-msg').textContent=msg; _modalCb=cb; document.getElementById('modal-ov').classList.add('show'); }
function modalConfirm(){ document.getElementById('modal-ov').classList.remove('show'); var cb=_modalCb; _modalCb=null; if(cb) cb(); }
function modalCancel(){ document.getElementById('modal-ov').classList.remove('show'); _modalCb=null; }
function timeAgo(ts){ var d=Date.now()-ts; if(d<60000) return 'à l\'instant'; if(d<3600000) return 'il y a '+Math.round(d/60000)+' min'; if(d<86400000) return 'il y a '+Math.round(d/3600000)+'h'; return 'il y a '+Math.round(d/86400000)+'j'; }
function formatDur(ms){ if(ms<60000) return '< 1 min'; if(ms<3600000) return Math.round(ms/60000)+' min'; if(ms<86400000) return (ms/3600000).toFixed(1)+'h'; return Math.round(ms/86400000)+'j'; }
var _tt;
function toast(msg){ var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){ el.classList.remove('show'); },2200); }
</script>
</body>
</html>
