ion:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--blue2),var(--blue));display:flex;align-items:center;gap:10px;padding:0 12px;color:white;box-shadow:0 3px 12px rgba(0,0,0,.13)}.topbar img{height:33px}.topbar .title{font-weight:900;line-height:1}.topbar .who{margin-left:auto;display:flex;align-items:center;gap:8px}.avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;font-weight:900;border:1px solid rgba(255,255,255,.35)}.main{padding:14px 14px 80px;max-width:1180px;margin:0 auto;width:100%}.nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:#fff;border-top:1px solid var(--sand2);display:flex;justify-content:space-around;padding:5px max(6px,env(safe-area-inset-left)) calc(5px + env(safe-area-inset-bottom))}.nav button{border:0;background:transparent;color:var(--muted);padding:6px 5px;border-radius:12px;min-width:58px;font-size:11px;font-weight:800}.nav button.active{color:var(--blue);background:#e7f7f8}.page-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 13px}.page-title{font-size:24px;font-weight:950}.page-sub{color:var(--muted);font-size:13px}.card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--shadow);margin-bottom:12px;border:1px solid rgba(0,0,0,.04)}.grid{display:grid;gap:12px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid4{grid-template-columns:repeat(4,minmax(0,1fr))}@media(max-width:820px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.hide-mobile{display:none}.main{padding:12px 10px 82px}.page-title{font-size:21px}}.seg{display:flex;gap:6px;overflow:auto;padding-bottom:3px}.seg button{border:1px solid var(--sand2);background:#fff;color:var(--muted);border-radius:999px;padding:8px 11px;white-space:nowrap;font-weight:800}.seg button.active{background:var(--blue);color:#fff;border-color:var(--blue)}.task{background:#fff;border-radius:17px;padding:13px;margin-bottom:9px;border-left:5px solid var(--blue);box-shadow:0 3px 14px rgba(28,43,53,.07)}.task.urgent{border-left-color:var(--danger);background:#fffafa}.task.done{opacity:.58}.task-top{display:flex;align-items:flex-start;gap:10px}.task input[type=checkbox]{width:20px;height:20px;accent-color:var(--blue);margin-top:2px}.task-text{font-size:15px;font-weight:750}.task.done .task-text{text-decoration:line-through;color:var(--muted)}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.pill{font-size:11px;padding:3px 8px;border-radius:999px;background:#eaf7f8;color:var(--blue2);font-weight:850}.pill.red{background:#fdecea;color:#7b241c}.pill.green{background:#e4f3eb;color:#1b5438}.pill.warn{background:#fef0dc;color:#7c4205}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.thread{margin-top:10px;border-top:1px solid var(--sand2);padding-top:8px}.comment{background:#f7f4ee;border-radius:12px;padding:8px;margin:6px 0}.comment b{color:var(--blue2)}.comment small{color:var(--muted);margin-left:5px}.inline-input{display:flex;gap:7px;margin-top:7px}.inline-input input{flex:1;border:1px solid var(--sand2);border-radius:10px;padding:8px}.kpi{background:#fff;border-radius:18px;padding:14px;box-shadow:var(--shadow);min-height:96px}.kpi .label{color:var(--muted);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.4px}.kpi .value{font-size:28px;font-weight:950;margin-top:4px}.kpi .hint{color:var(--muted);font-size:12px}.bar-row{display:grid;grid-template-columns:120px 1fr 54px;align-items:center;gap:8px;margin:8px 0}.bar-bg{height:12px;background:var(--sand);border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px}.map-wrap{position:relative;background:#dff4f4;border-radius:20px;overflow:hidden;box-shadow:var(--shadow);border:1px solid #cde}.map-img{display:block;width:100%;height:auto}.pin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px rgba(0,0,0,.22));animation:dogPop 2.7s ease forwards}.stars{position:absolute;inset:0;display:grid;place-items:center;font-size:42px;opacity:0;animation:starsPop 2.7s ease forwards}@keyframes dogPop{0%{bottom:-360px}18%{bottom:8px}35%{bottom:0}70%{bottom:0}100%{bottom:-360px}}@keyframes starsPop{15%{opacity:0;transform:scale(.7)}35%{opacity:1;transform:scale(1.15)}70%{opacity:1}100%{opacity:0;transform:scale(.9)}}.client-hero{min-height:100vh;padding:18px;background:linear-gradient(150deg,#e8fbfc,#f7f1e6);display:flex;align-items:center;justify-content:center}.client-card{width:100%;max-width:620px;background:#fff;border-radius:28px;padding:22px;box-shadow:var(--shadow)}.flags{display:flex;gap:7px;flex-wrap:wrap}.flags button{border:1px solid var(--sand2);background:#fff;border-radius:12px;padding:8px 10px;font-size:22px}.flags button.active{border-color:var(--blue);background:#e7f7f8}.empty{color:var(--muted);text-align:center;padding:20px}.qrbox{background:#f8f6f0;border:1px dashed #c8bcaa;border-radius:15px;padding:10px;word-break:break-all;color:var(--muted)}.table{width:100%;border-collapse:collapse}.table th,.table td{text-align:left;border-bottom:1px solid var(--sand2);padding:9px}.table th{font-size:12px;color:var(--muted);text-transform:uppercase}

function login(){let e=val('le').toLowerCase(),p=val('lp');let u=S.users.find(x=>x.email.toLowerCase()===e&&x.password===p);if(!u)return err('Identifiants incorrects.');currentUser=u;localStorage.setItem('braou_user',u.id);showApp()}
function register(){let nom=val('rn'),email=val('re').toLowerCase(),pass=val('rp'),code=val('rc').toUpperCase();let role=Object.keys(S.codes).find(k=>S.codes[k].toUpperCase()===code);if(!nom||!email||!pass||!role)return err('Informations incomplètes ou code invalide.');if(S.users.some(u=>u.email.toLowerCase()===email))return err('Email déjà utilisé.');let u={id:uid('u'),nom,email,password:pass,role};S.users.push(u);save();currentUser=u;localStorage.setItem('braou_user',u.id);showApp()}
function err(m){let e=document.getElementById('loginErr');e.textContent=m;e.style.display='block'}function val(id){let e=document.getElementById(id);return e?e.value.trim():''}
function showApp(){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('clientScreen').classList.add('hidden');document.getElementById('appScreen').classList.remove('hidden');renderTop();renderNav();renderPage();checkAutoReports()}
function renderTop(){document.getElementById('roleLine').textContent=currentUser.nom+' — '+roleLabel(currentUser.role);document.getElementById('profileBtn').textContent=(currentUser.nom||'?').slice(0,1).toUpperCase();let n=S.clients.filter(x=>x.status==='new').length;document.getElementById('notifDot').innerHTML=n&&canManage()?`<span class="pill red">${n} client</span>`:''}
function canManage(){return ['admin','responsable'].includes(currentUser.role)}function roleLabel(r){return {admin:'Admin',responsable:'Responsable',menage:'Ménage',technique:'Technique',accueil:'Accueil'}[r]||r}
function pages(){let a=[['tasks','Tâches','☑'],['map','Carte','🗺']];if(canManage())a.push(['suivi','Suivi','📊'],['clients','Clients','⚑'],['reports','Rapports','⬇']);if(currentUser.role==='admin')a.push(['team','Équipe','👥']);return a}
function renderNav(){document.getElementById('nav').innerHTML=pages().map(p=>`<button class="${page===p[0]?'active':''}" onclick="page='${p[0]}';renderPage()"><div>${p[2]}</div>${p[1]}</button>`).join('')}
function renderPage(){renderTop();renderNav();let m=document.getElementById('main');if(page==='tasks')m.innerHTML=renderTasks();if(page==='suivi')m.innerHTML=renderSuivi();if(page==='clients')m.innerHTML=renderClients();if(page==='map')m.innerHTML=renderMap();if(page==='reports')m.innerHTML=renderReports();if(page==='team')m.innerHTML=renderTeam()}
function taskAllowed(t){return canManage()||t.pole===currentUser.role||t.agentId===currentUser.id}
function renderTasks(){let all=S.tasks[pole].filter(taskAllowed);let list=all.filter(t=>filter==='all'||(filter==='todo'&&!t.done)||(filter==='done'&&t.done)||(filter==='urgent'&&t.priority==='urgent')||(filter==='mine'&&t.agentId===currentUser.id));let h=`<div class="page-head"><div><div class="page-title">Tâches</div><div class="page-sub">${all.filter(t=>!t.done).length} en cours — ${roleLabel(pole)}</div></div></div><div class="seg">${['menage','technique','accueil'].map(p=>`<button class="${pole===p?'active':''}" onclick="pole='${p}';filter='todo';renderPage()">${roleLabel(p)}</button>`).join('')}</div><div class="card">${taskForm()}</div><div class="seg">${[['todo','À faire'],['mine','À moi'],['urgent','Urgent'],['done','Terminées'],['all','Toutes']].map(f=>`<button class="${filter===f[0]?'active':''}" onclick="filter='${f[0]}';renderPage()">${f[1]}</button>`).join('')}</div>`; if(pole==='accueil')h+=renderAccueilAssign();h+=`<div style="margin-top:10px">${list.length?list.sort((a,b)=>a.done-b.done||b.createdAt-a.createdAt).map(renderTask).join(''):'<div class="card empty">Aucune tâche dans ce filtre.</div>'}</div>`;return h}
function taskForm(){let agentOps=`<option value="">Pool du pôle</option>`+S.users.filter(u=>['admin','responsable',pole].includes(u.role)).map(u=>`<option value="${u.id}">${u.nom} — ${roleLabel(u.role)}</option>`).join('');let presets=PRESETS[pole]||[];return `<div class="grid grid3"><div class="field"><label>Menu roulant tâche pré-paramétrée</label><select id="preset" onchange="presetChanged()"><option value="">Tâche libre</option>${presets.map(p=>`<option>${p}</option>`).join('')}</select></div><div class="field"><label>Priorité</label><select id="prio"><option value="normal">Normale</option><option value="high">Haute</option><option value="urgent">Urgente</option></select></div><div class="field"><label>Attribuer à</label><select id="agent">${agentOps}</select></div></div>${pole==='menage'?`<div class="grid grid2"><div class="field"><label>Catégorie logement</label><select id="logtype"><option value="">Non concerné</option>${TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="field"><label>Numéro logement</label><input id="logno" inputmode="numeric" placeholder="ex : 132"></div></div>`:pole==='accueil'?`<div class="grid grid2"><div class="field"><label>Type logement attribué</label><select id="logtype"><option value="">Non concerné</option>${TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="field"><label>Numéro attribué</label><input id="logno" inputmode="numeric" placeholder="ex : 148"></div></div>`:''}<div class="field"><label>Détail libre, toujours modifiable</label><textarea id="tasktxt" rows="2" placeholder="Ajouter des précisions même après avoir choisi un pré-paramétrage"></textarea></div><button class="btn" onclick="addTask()">Ajouter la tâche</button>`}
function presetChanged(){let p=val('preset'),ta=document.getElementById('tasktxt'); if(p&&!ta.value)ta.value=p+' — ';}
function addTask(extra){let preset=extra?.preset||val('preset'),txt=extra?.text||val('tasktxt'),lt=extra?.logtype||val('logtype'),ln=extra?.logno||val('logno'),agent=extra?.agentId||val('agent'),prio=extra?.priority||val('prio')||'normal';if(!txt&&preset)txt=preset;if(!txt)return toast('Décris la tâche.');let t={id:uid('t'),pole,texte:txt,preset,logementType:lt,logementNo:ln,agentId:agent||'',priority:prio,done:false,createdAt:Date.now(),doneAt:null,comments:[],source:extra?.source||'manual'};S.tasks[pole].push(t);save();notify('Nouvelle tâche '+roleLabel(pole),txt);renderPage();toast('Tâche ajoutée')}
function renderTask(t){let u=S.users.find(x=>x.id===t.agentId);let pri=t.priority==='urgent'?'red':t.priority==='high'?'warn':'';let comments=(t.comments||[]).map(c=>`<div class="comment"><b>${esc(c.author)}</b><small>${fmt(c.at)}</small><div>${esc(c.text)}</div></div>`).join('');return `<div class="task ${t.priority==='urgent'?'urgent':''} ${t.done?'done':''}"><div class="task-top"><input type="checkbox" ${t.done?'checked':''} onchange="toggleDone('${t.id}')"><div style="flex:1"><div class="task-text">${esc(t.texte)}</div><div class="meta"><span class="pill ${t.done?'green':pri}">${t.done?'Terminée':t.priority}</span>${t.preset?`<span class="pill">${esc(t.preset)}</span>`:''}${t.logementNo?`<span class="pill">${esc(t.logementType||'Logement')} n°${esc(t.logementNo)}</span>`:''}<span class="pill">${u?esc(u.nom):'Pool '+roleLabel(t.pole)}</span><span class="pill">${age(t.createdAt)}</span></div><div class="actions">${!t.agentId?`<button class="btn small secondary" onclick="takeTask('${t.id}')">Prendre</button>`:''}${t.agentId===currentUser.id?`<button class="btn small ghost" onclick="releaseTask('${t.id}')">Relâcher</button>`:''}${canManage()?`<button class="btn small danger" onclick="delTask('${t.id}')">Supprimer</button>`:''}</div><div class="thread"><b>Fil de discussion</b>${comments||'<div class="page-sub">Aucun message.</div>'}<div class="inline-input"><input id="c_${t.id}" placeholder="Message sur cette tâche"><button class="btn small" onclick="addComment('${t.id}')">Envoyer</button></div></div></div></div></div>`}
function findTask(id){for(let p of ['menage','technique','accueil']){let t=S.tasks[p].find(x=>x.id===id);if(t)return t}}
function toggleDone(id){let t=findTask(id);if(!t)return;t.done=!t.done;t.doneAt=t.done?Date.now():null;save();if(t.done){if(S.settings.dog)showDog();playDone();notify('Tâche terminée',t.texte)}renderPage()}
function takeTask(id){let t=findTask(id);t.agentId=currentUser.id;save();renderPage()}function releaseTask(id){let t=findTask(id);t.agentId='';save();renderPage()}function delTask(id){if(!confirm('Supprimer cette tâche ?'))return;for(let p of ['menage','technique','accueil'])S.tasks[p]=S.tasks[p].filter(t=>t.id!==id);save();renderPage()}
function addComment(id){let t=findTask(id),inp=document.getElementById('c_'+id);let text=inp.value.trim();if(!text)return;t.comments=t.comments||[];t.comments.push({id:uid('c'),author:currentUser.nom,text,at:Date.now()});save();renderPage()}
function renderAccueilAssign(){let d=new Date().toISOString().slice(0,10);let v=S.assignments[d]||'';return `<div class="card"><b>Rubrique accueil — logements attribués du jour</b><div class="field"><textarea id="assign" rows="3" placeholder="Ex : Famille Martin → MH 132, Dupont → Lodge 181">${esc(v)}</textarea></div><button class="btn secondary" onclick="S.assignments['${d}']=val('assign');save();toast('Logements attribués enregistrés')">Enregistrer</button></div>`}
function allTasks(){return ['menage','technique','accueil'].flatMap(p=>S.tasks[p].map(t=>({...t,pole:p})))}
function renderSuivi(){let ts=allTasks(),done=ts.filter(t=>t.done),open=ts.filter(t=>!t.done),men=done.filter(t=>t.pole==='menage'),avg=arrAvg(done.map(dur).filter(Boolean));let h=`<div class="page-head"><div><div class="page-title">Suivi & pilotage</div><div class="page-sub">KPIs mis à jour automatiquement selon les tâches et requêtes.</div></div><button class="btn" onclick="downloadReport('manuel')">Générer rapport</button></div><div class="grid grid4"><div class="kpi"><div class="label">Taux réalisation</div><div class="value">${pct(done.length,ts.length)}%</div><div class="hint">${done.length}/${ts.length} tâches</div></div><div class="kpi"><div class="label">Cycle moyen</div><div class="value">${formatDur(avg)}</div><div class="hint">création → terminé</div></div><div class="kpi"><div class="label">Urgences ouvertes</div><div class="value" style="color:var(--danger)">${open.filter(t=>t.priority==='urgent').length}</div><div class="hint">à traiter en priorité</div></div><div class="kpi"><div class="label">Demandes client</div><div class="value">${S.clients.length}</div><div class="hint">${S.clients.filter(c=>c.status==='new').length} nouvelles</div></div></div>`;h+=chart('Temps nettoyage moyen par type',avgBy(men,'logementType',dur),'min',true);h+=chart('Logements / numéros les plus attribués ou traités',topLogements(ts),'fois');h+=chart('Volume par pôle',countBy(ts,'pole'),'tâches');h+=chart('Performance par personne',countBy(done.filter(t=>t.agentId),'agentId',id=>userName(id)),'terminées');h+=chart('Demandes client par statut',countBy(S.clients,'status'),'demandes');h+=`<div class="card"><b>Lecture automatique</b><p>${analysisLines(ts).join('<br>')}</p></div>`;return h}
function chart(title,obj,unit,isMs){let entries=Object.entries(obj).filter(x=>x[0]).sort((a,b)=>b[1]-a[1]).slice(0,8);let max=Math.max(1,...entries.map(x=>x[1]));return `<div class="card"><b>${title}</b>${entries.length?entries.map(([k,v])=>`<div class="bar-row"><div>${esc(labelKey(k))}</div><div class="bar-bg"><div class="bar" style="width:${Math.max(3,v/max*100)}%"></div></div><div>${isMs?Math.round(v/60000):v} ${unit}</div></div>`).join(''):'<div class="empty">Pas encore assez de données.</div>'}</div>`}
function avgBy(arr,key,fn){let m={};arr.forEach(x=>{let k=x[key]||'Non précisé';(m[k]=m[k]||[]).push(fn(x))});Object.keys(m).forEach(k=>m[k]=Math.round(arrAvg(m[k].filter(Boolean))||0));return m}
function countBy(arr,key,lab){let m={};arr.forEach(x=>{let k=lab?lab(x[key]):(x[key]||'Non précisé');m[k]=(m[k]||0)+1});return m}
function topLogements(ts){let m={};ts.forEach(t=>{if(t.logementNo){let k=(t.logementType||'Logement')+' '+t.logementNo;m[k]=(m[k]||0)+1}});S.clients.forEach(c=>{if(c.place){let k='Client '+c.place;m[k]=(m[k]||0)+1}});return m}
function renderClients(){if(!canManage())return '<div class="card">Accès réservé.</div>';let link=clientLink();return `<div class="page-head"><div><div class="page-title">Demandes client</div><div class="page-sub">Page publique sans compte + filtrage responsable/admin.</div></div></div><div class="card"><b>Lien client à transformer en QR code</b><div class="qrbox" id="clientLink">${link}</div><div class="actions"><button class="btn secondary" onclick="copyText('${link}')">Copier le lien</button><button class="btn ghost" onclick="location.hash='client';location.reload()">Tester la page client</button></div></div>${S.clients.length?S.clients.sort((a,b)=>b.createdAt-a.createdAt).map(renderClientReq).join(''):'<div class="card empty">Aucune demande client.</div>'}`}
function renderClientReq(c){return `<div class="card"><div class="meta"><span class="pill ${c.status==='new'?'red':c.status==='assigned'?'warn':'green'}">${c.status}</span><span class="pill">n°${esc(c.place)}</span><span class="pill">${fmt(c.createdAt)}</span><span class="pill">${esc(c.lang)}</span></div><div style="font-size:16px;font-weight:800;margin:8px 0">${esc(c.text)}</div><div class="field"><label>Texte reformulé pour salarié</label><textarea id="ct_${c.id}" rows="2">${esc(c.filteredText||c.text)}</textarea></div><div class="grid grid3"><select id="cp_${c.id}"><option value="technique">Technique</option><option value="menage">Ménage</option><option value="accueil">Accueil</option></select><select id="ca_${c.id}"><option value="">Pool du pôle</option>${S.users.map(u=>`<option value="${u.id}">${esc(u.nom)}</option>`).join('')}</select><select id="cprio_${c.id}"><option value="normal">Normale</option><option value="high">Haute</option><option value="urgent">Urgente</option></select></div><div class="actions"><button class="btn" onclick="transferClient('${c.id}')">Transférer en tâche</button><button class="btn secondary" onclick="c.status='kept';c.filteredText=val('ct_${c.id}');save();renderPage()">Laisser / modifier</button><button class="btn danger" onclick="deleteClient('${c.id}')">Supprimer</button></div></div>`}
function transferClient(id){let c=S.clients.find(x=>x.id===id);let p=val('cp_'+id);pole=p;let t={preset:'Demande client',text:val('ct_'+id),logno:c.place,logtype:'Client',agentId:val('ca_'+id),priority:val('cprio_'+id),source:'client'};addTask(t);c.status='assigned';c.filteredText=t.text;save();page='tasks';renderPage()}
function deleteClient(id){S.clients=S.clients.filter(c=>c.id!==id);save();renderPage()}
function renderMap(){let ts=allTasks().filter(t=>!t.done&&t.logementNo);let pins=ts.map(t=>{let p=coord(t.logementNo);return `<button class="pin ${t.source==='client'?'client':''}" style="left:${p.x}%;top:${p.y}%" onclick="mapSelected='${t.id}';renderPage()">${esc(t.logementNo)}</button>`}).join('');let pop='';if(mapSelected){let t=findTask(mapSelected);if(t)pop=`<div class="map-pop"><b>${esc(t.logementType||'Logement')} n°${esc(t.logementNo)}</b><p>${esc(t.texte)}</p><button class="btn small" onclick="page='tasks';pole='${t.pole}';filter='all';renderPage()">Ouvrir dans les tâches</button> <button class="btn small ghost" onclick="mapSelected=null;renderPage()">Fermer</button></div>`}return `<div class="page-head"><div><div class="page-title">Carte interactive</div><div class="page-sub">Les tâches avec numéro apparaissent sur le plan. Cliquez un repère.</div></div></div><div class="map-wrap"><img class="map-img" src="${PLAN_IMG}" alt="Plan camping">${pins}${pop}</div><div class="card"><b>Vue intervention</b><p>${ts.length} intervention(s) avec numéro de logement. Les coordonnées sont pré-positionnées automatiquement depuis les numéros ; elles pourront être affinées si tu veux une précision emplacement par emplacement.</p></div>`}
function coord(no){let n=parseInt(no)||1,x=50,y=50;if(n<=80){x=18+(n%16)*3.3;y=66-Math.floor(n/16)*6}else if(n<=119){x=62+((n-81)%13)*2.2;y=70-Math.floor((n-81)/13)*5}else if(n<=148){x=76+((n-120)%8)*2.1;y=45-Math.floor((n-120)/8)*6}else if(n<=182){x=44+((n-149)%9)*3.1;y=31-Math.floor((n-149)/9)*5}else{x=61+((n-183)%6)*3.3;y=18+Math.floor((n-183)/6)*5}return{x:Math.max(8,Math.min(92,x)),y:Math.max(10,Math.min(82,y))}}
function renderReports(){return `<div class="page-head"><div><div class="page-title">Rapports automatiques</div><div class="page-sub">Jour 23h59, dimanche 23h59, dernier jour du mois 23h59. Génération si l’application est ouverte.</div></div><button class="btn" onclick="downloadReport('manuel')">Générer</button></div><div class="card"><div class="actions"><button class="btn secondary" onclick="purgeOld()">Supprimer données tâches > 2 mois</button><button class="btn ghost" onclick="exportJSON()">Exporter données JSON</button></div></div>${S.reports.length?`<table class="table"><tr><th>Date</th><th>Période</th><th>Actions</th></tr>${S.reports.slice().reverse().map(r=>`<tr><td>${fmt(r.at)}</td><td>${r.period}</td><td><button class="btn small" onclick="downloadSavedReport('${r.id}')">Télécharger</button></td></tr>`).join('')}</table>`:'<div class="card empty">Aucun rapport généré.</div>'}`}
function buildReport(period){let ts=allTasks(),lines=analysisLines(ts);return `<!doctype html><html><meta charset="utf-8"><title>Rapport KPI ${period}</title><body style="font-family:Arial;padding:24px"><h1>Rapport KPI — ${period}</h1><p>${new Date().toLocaleString('fr-FR')}</p><h2>Synthèse</h2><ol>${lines.map(l=>`<li>${esc(l)}</li>`).join('')}</ol><h2>Indicateurs</h2><ul><li>Tâches totales : ${ts.length}</li><li>Tâches terminées : ${ts.filter(t=>t.done).length}</li><li>Urgences ouvertes : ${ts.filter(t=>!t.done&&t.priority==='urgent').length}</li><li>Demandes client : ${S.clients.length}</li></ul><h2>Données utiles</h2><pre>${esc(JSON.stringify({topLogements:topLogements(ts),parPole:countBy(ts,'pole'),parStatutClient:countBy(S.clients,'status')},null,2))}</pre></body></html>`}
function downloadReport(period){let html=buildReport(period),r={id:uid('r'),period,at:Date.now(),html};S.reports.push(r);save();download('rapport-kpi-'+period+'-'+new Date().toISOString().slice(0,10)+'.html',html,'text/html');toast('Rapport généré')}
function downloadSavedReport(id){let r=S.reports.find(x=>x.id===id);if(r)download('rapport-kpi-'+r.period+'.html',r.html,'text/html')}
function checkAutoReports(){if(!currentUser)return;let d=new Date();if(d.getHours()!==23||d.getMinutes()!==59)return;let key=d.toISOString().slice(0,10);autoOne('daily',key);if(d.getDay()===0)autoOne('weekly',key);let tomorrow=new Date(d);tomorrow.setDate(d.getDate()+1);if(tomorrow.getDate()===1)autoOne('monthly',key)}
function autoOne(period,key){let k=period+'_'+key;if(S.lastReports[k])return;S.lastReports[k]=true;S.reports.push({id:uid('r'),period,at:Date.now(),html:buildReport(period)});purgeOld(false);save();notify('Rapport KPI généré',period)}
function purgeOld(show=true){let lim=Date.now()-60*86400000;for(let p of ['menage','technique','accueil'])S.tasks[p]=S.tasks[p].filter(t=>!t.done||t.doneAt>lim);save();if(show){toast('Anciennes tâches supprimées');renderPage()}}
function analysisLines(ts){let open=ts.filter(t=>!t.done),urg=open.filter(t=>t.priority==='urgent').length;let slow=Object.entries(avgBy(ts.filter(t=>t.done&&t.pole==='menage'),'logementType',dur)).sort((a,b)=>b[1]-a[1])[0];let top=Object.entries(topLogements(ts)).sort((a,b)=>b[1]-a[1])[0];return [`${pct(ts.filter(t=>t.done).length,ts.length)}% des tâches sont terminées ; ${urg} urgence(s) restent ouvertes.`,slow?`Le type le plus long à nettoyer est ${slow[0]} avec environ ${Math.round(slow[1]/60000)} min de moyenne.`:'Pas encore assez de données de nettoyage pour isoler le logement le plus chronophage.',top?`Le logement ou numéro le plus récurrent est ${top[0]} (${top[1]} occurrence(s)), à surveiller en attribution ou maintenance.`:'Aucune récurrence par logement détectée pour l’instant.']}
function renderTeam(){return `<div class="page-head"><div><div class="page-title">Équipe</div><div class="page-sub">Gestion des comptes et rôles.</div></div></div>${S.users.map(u=>`<div class="card"><b>${esc(u.nom)}</b><div class="page-sub">${esc(u.email)}</div><div class="row"><select id="role_${u.id}">${['admin','responsable','menage','technique','accueil'].map(r=>`<option ${u.role===r?'selected':''} value="${r}">${roleLabel(r)}</option>`).join('')}</select><button class="btn secondary" onclick="saveRole('${u.id}')">Modifier</button>${u.id!==currentUser.id?`<button class="btn danger" onclick="delUser('${u.id}')">Supprimer</button>`:''}</div></div>`).join('')}`}
function saveRole(id){let u=S.users.find(x=>x.id===id);u.role=val('role_'+id);save();renderPage()}function delUser(id){S.users=S.users.filter(u=>u.id!==id);save();renderPage()}
function openSettings(){let s=S.settings;document.getElementById('settingsContent').innerHTML=`<div class="page-head"><div><div class="page-title">Paramètres</div><div class="page-sub">Profil, notifications et préférences</div></div><button class="btn ghost" onclick="closeSettings()">Fermer</button></div><div class="field"><label>Nom</label><input id="setNom" value="${esc(currentUser.nom)}"></div><div class="field"><label>Identifiant email</label><input id="setEmail" value="${esc(currentUser.email)}"></div><div class="field"><label>Nouveau mot de passe</label><input id="setPass" type="password" placeholder="Laisser vide pour ne pas changer"></div><button class="btn" onclick="saveSettingsProfile()">Enregistrer profil</button><div class="setting-row"><div><b>Notifications téléphone</b><div class="page-sub">Utilise l’API Notification du navigateur.</div></div>${sw('push',s.push)}</div><div class="setting-row"><div><b>Sons de notification</b><div class="page-sub">Son plus doux, type carillon.</div></div>${sw('sound',s.sound)}</div><div class="setting-row"><div><b>Animation du chien</b><div class="page-sub">Fond retiré autant que possible, animation conservée.</div></div>${sw('dog',s.dog)}</div><div class="actions"><button class="btn secondary" onclick="requestPush()">Autoriser / tester notification</button><button class="btn ghost" onclick="logout()">Déconnexion</button></div>`;document.getElementById('settingsModal').classList.add('show')}
function sw(k,on){return `<label class="switch"><input type="checkbox" ${on?'checked':''} onchange="S.settings['${k}']=this.checked;save()"><span class="slider"></span></label>`}function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}
function saveSettingsProfile(){currentUser.nom=val('setNom')||currentUser.nom;currentUser.email=val('setEmail')||currentUser.email;let p=val('setPass');if(p)currentUser.password=p;save();renderTop();toast('Profil modifié');closeSettings()}
function requestPush(){Notification?.requestPermission?.().then(()=>{S.settings.push=true;save();notify('Notifications activées','Le Braou Pilot peut envoyer des alertes locales.')})}
function logout(){localStorage.removeItem('braou_user');currentUser=null;closeSettings();renderLogin('login')}

function sendClientReq(){let place=val('clPlace'),text=val('clText');if(!place||!text)return;S.clients.push({id:uid('cl'),place,text,lang:clientLang,status:'new',createdAt:Date.now()});save();let ok=document.getElementById('clientOk');ok.textContent=TXT[clientLang][4];ok.style.display='block';document.getElementById('clText').value='';}
function clientLink(){return location.href.replace(/#.*$/,'').replace(/\?.*$/,'')+'#client'}
function notify(title,body){if(S.settings.sound)playBell();if(S.settings.push&&'Notification'in window&&Notification.permission==='granted')new Notification(title,{body});}
let actx;function audio(){actx=actx||new(window.AudioContext||window.webkitAudioContext)();return actx}function playBell(){try{let c=audio();[660,880,990].forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0,c.currentTime+i*.08);g.gain.linearRampToValueAtTime(.07,c.currentTime+i*.08+.02);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.08+.32);o.start(c.currentTime+i*.08);o.stop(c.currentTime+i*.08+.35)})}catch(e){}}
function playDone(){if(S.settings.sound)playBell()}function showDog(){let d=document.getElementById('dogOverlay');d.classList.remove('show');void d.offsetWidth;d.classList.add('show');setTimeout(()=>d.classList.remove('show'),2800)}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function fmt(ts){return new Date(ts).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}function age(ts){let d=Date.now()-ts;if(d<3600000)return Math.round(d/60000)||1+' min';if(d<86400000)return Math.round(d/3600000)+'h';return Math.round(d/86400000)+'j'}function dur(t){return t.doneAt&&t.createdAt?Math.max(60000,t.doneAt-t.createdAt):0}function formatDur(ms){if(!ms)return '0 min';if(ms<3600000)return Math.round(ms/60000)+' min';return (ms/3600000).toFixed(1)+' h'}function arrAvg(a){return a.length?a.reduce((s,x)=>s+x,0)/a.length:0}function pct(a,b){return b?Math.round(a/b*100):0}function userName(id){let u=S.users.find(x=>x.id===id);return u?u.nom:'Non attribué'}function labelKey(k){return roleLabel(k)||k}
function copyText(t){navigator.clipboard?.writeText(t);toast('Lien copié')}function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function exportJSON(){download('le-braou-donnees.json',JSON.stringify(S,null,2),'application/json')}
function setupPWA(){if(!('serviceWorker'in navigator))return;let code=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([code],{type:'text/javascript'}))).catch(()=>{})}
window.addEventListener('hashchange',()=>{if(location.hash==='#client')renderClient()});boot();
