// ============================================================
// === KPI AVANCÉS - Suivi (pilotage)                        ===
// ============================================================
function buildAdvancedKPIs(){
  var allTasks = TASKS.menage.concat(TASKS.technique).concat(TASKS.accueil);
  var menageTasksWithLogement = TASKS.menage.filter(function(t){return t.logement_type && t.done && t.done_at;});

  var h = '';

  // === BLOC 1 : KPIs Ménage par type de logement ===
  h += '<div class="kpi-card"><div class="kpi-title">🧹 Temps moyen de nettoyage par type de logement</div>';

  var timesByType = {};
  menageTasksWithLogement.forEach(function(t){
    if(t.preset === 'nettoyage' || /nettoy/i.test(t.texte)){
      if(!timesByType[t.logement_type]) timesByType[t.logement_type] = [];
      timesByType[t.logement_type].push(t.done_at - t.created_at);
    }
  });

  var typeKeys = Object.keys(timesByType);
  if(typeKeys.length === 0){
    h += '<p style="font-size:12px;color:var(--text3)">Pas encore assez de données. Effectuez quelques tâches de nettoyage avec un type de logement renseigné pour voir apparaître les temps moyens.</p>';
  } else {
    // Trier par temps moyen décroissant
    var sortedTypes = typeKeys.map(function(k){
      var sum = timesByType[k].reduce(function(a,b){return a+b;},0);
      var avg = sum / timesByType[k].length;
      return {key:k, avg:avg, count:timesByType[k].length};
    }).sort(function(a,b){return b.avg-a.avg;});

    var maxAvg = sortedTypes[0].avg;
    sortedTypes.forEach(function(item){
      var info = LOGEMENT_TYPES[item.key];
      var pct = Math.round(item.avg/maxAvg*100);
      h += '<div class="bar-row">';
      h += '<div class="bar-name">'+info.emoji+' '+info.label.replace('Mobile-Home ','').replace('Bungalow ','')+'</div>';
      h += '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+info.color+'">'+(pct>20?formatDur(item.avg):'')+'</div></div>';
      h += '<div class="bar-count">'+item.count+'×</div>';
      h += '</div>';
    });
  }
  h += '</div>';

  // === BLOC 2 : KPIs Accueil - logements les plus attribués ===
  var accueilTasksWithLogement = TASKS.accueil.filter(function(t){return t.logement_type;});

  h += '<div class="kpi-card"><div class="kpi-title">🛎 Logements les plus attribués (Accueil)</div>';

  if(accueilTasksWithLogement.length === 0){
    h += '<p style="font-size:12px;color:var(--text3)">Aucune attribution de logement enregistrée pour le moment.</p>';
  } else {
    // Par type
    var attribByType = {};
    accueilTasksWithLogement.forEach(function(t){
      attribByType[t.logement_type] = (attribByType[t.logement_type] || 0) + 1;
    });
    var totalAttrib = Object.values(attribByType).reduce(function(a,b){return a+b;},0);
    var maxAttribType = Math.max.apply(null, Object.values(attribByType));

    h += '<div style="font-size:11px;color:var(--text2);margin-bottom:7px;font-weight:600">Par type</div>';
    Object.keys(attribByType).sort(function(a,b){return attribByType[b]-attribByType[a];}).forEach(function(k){
      var info = LOGEMENT_TYPES[k];
      var cnt = attribByType[k];
      var pct = Math.round(cnt/maxAttribType*100);
      var pctTot = Math.round(cnt/totalAttrib*100);
      h += '<div class="bar-row">';
      h += '<div class="bar-name">'+info.emoji+' '+info.label.replace('Mobile-Home ','').replace('Bungalow ','')+'</div>';
      h += '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+info.color+'">'+(pct>15?pctTot+'%':'')+'</div></div>';
      h += '<div class="bar-count">'+cnt+'</div>';
      h += '</div>';
    });

    // Par numéro
    var attribByNum = {};
    accueilTasksWithLogement.forEach(function(t){
      if(t.logement_num){
        var key = t.logement_num + '|' + t.logement_type;
        attribByNum[key] = (attribByNum[key] || 0) + 1;
      }
    });
    var sortedNums = Object.keys(attribByNum).map(function(k){
      var parts = k.split('|');
      return {num:parts[0], type:parts[1], count:attribByNum[k]};
    }).sort(function(a,b){return b.count-a.count;}).slice(0,5);

    if(sortedNums.length){
      h += '<div style="font-size:11px;color:var(--text2);margin:12px 0 7px;font-weight:600">Top 5 numéros</div>';
      sortedNums.forEach(function(item,i){
        var info = LOGEMENT_TYPES[item.type];
        var medals = ['🥇','🥈','🥉','4.','5.'];
        h += '<div class="kpi-row">';
        h += '<div class="kpi-row-label"><span style="font-size:14px">'+medals[i]+'</span> '+info.emoji+' n°'+item.num+' <span style="color:var(--text3);font-size:11px">('+info.label+')</span></div>';
        h += '<div class="kpi-row-val">'+item.count+' attrib.</div>';
        h += '</div>';
      });
    }
  }
  h += '</div>';

  // === BLOC 3 : Numéros de logement les plus visités (toutes tâches) ===
  var allWithNum = allTasks.filter(function(t){return t.logement_num;});
  if(allWithNum.length > 0){
    var visitsByNum = {};
    allWithNum.forEach(function(t){
      var k = t.logement_num + '|' + (t.logement_type||'unknown');
      visitsByNum[k] = (visitsByNum[k] || 0) + 1;
    });
    var sortedVisits = Object.keys(visitsByNum).map(function(k){
      var parts = k.split('|');
      return {num:parts[0], type:parts[1], count:visitsByNum[k]};
    }).sort(function(a,b){return b.count-a.count;}).slice(0,8);

    h += '<div class="kpi-card"><div class="kpi-title">🏆 Logements les plus sollicités (toutes tâches)</div>';
    sortedVisits.forEach(function(item,i){
      var info = LOGEMENT_TYPES[item.type] || {emoji:'📍', label:'Inconnu'};
      h += '<div class="kpi-row">';
      h += '<div class="kpi-row-label">'+(i+1)+'. '+info.emoji+' n°'+item.num+'</div>';
      h += '<div class="kpi-row-val">'+item.count+' tâches</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // === BLOC 4 : Statistiques globales par type ===
  h += '<div class="kpi-card"><div class="kpi-title">📊 Aperçu par catégorie de logement</div>';
  var typeStats = {};
  Object.keys(LOGEMENT_TYPES).forEach(function(k){
    typeStats[k] = {total:0, done:0, urgent:0, avgTime:0, times:[]};
  });
  allTasks.forEach(function(t){
    if(t.logement_type && typeStats[t.logement_type]){
      typeStats[t.logement_type].total++;
      if(t.done){
        typeStats[t.logement_type].done++;
        if(t.done_at) typeStats[t.logement_type].times.push(t.done_at - t.created_at);
      }
      if(t.priorite==='urgent' && !t.done) typeStats[t.logement_type].urgent++;
    }
  });

  var hasData = false;
  Object.keys(typeStats).forEach(function(k){
    var s = typeStats[k];
    if(s.total === 0) return;
    hasData = true;
    var info = LOGEMENT_TYPES[k];
    var avgTime = s.times.length ? s.times.reduce(function(a,b){return a+b;},0) / s.times.length : 0;
    h += '<div style="background:var(--sand);border-radius:8px;padding:9px 11px;margin-bottom:6px;border-left:3px solid '+info.color+'">';
    h += '<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px">'+info.emoji+' '+info.label+'</div>';
    h += '<div style="display:flex;gap:10px;font-size:11px;color:var(--text2);flex-wrap:wrap">';
    h += '<span><b style="color:var(--text)">'+s.total+'</b> tâches</span>';
    h += '<span><b style="color:var(--ok)">'+s.done+'</b> ✓</span>';
    if(s.urgent>0) h += '<span><b style="color:var(--danger)">'+s.urgent+'</b> 🔴</span>';
    if(avgTime>0) h += '<span>⏱ <b>'+formatDur(avgTime)+'</b> moy.</span>';
    h += '</div></div>';
  });
  if(!hasData){
    h += '<p style="font-size:12px;color:var(--text3)">Aucune tâche n\'a encore été créée avec un type de logement.</p>';
  }
  h += '</div>';

  return h;
}


/* === Optimisation Suivi / Paramètres / Notifications === */
var APP_PREFS={sound:true,inapp:true,system:false,dog:true,keepInApp:true};
var _origLoad=typeof load==='function'?load:null;
var _origSave=typeof save==='function'?save:null;
function escHtml(v){return String(v==null?'':v).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function loadAppPrefs(){try{var raw=localStorage.getItem('cp_app_prefs');if(raw){APP_PREFS=Object.assign(APP_PREFS,JSON.parse(raw));}NOTIF_SOUND_ENABLED=APP_PREFS.sound!==false;}catch(e){}}
function saveAppPrefs(){try{APP_PREFS.sound=!!NOTIF_SOUND_ENABLED;localStorage.setItem('cp_app_prefs',JSON.stringify(APP_PREFS));localStorage.setItem('cp_notif_sound',APP_PREFS.sound?'1':'0');}catch(e){}}
if(_origLoad){load=function(){_origLoad();loadAppPrefs();};}else{loadAppPrefs();}
if(_origSave){save=function(){_origSave();saveAppPrefs();};}
function togglePref(key,cb){APP_PREFS[key]=!!cb.checked;if(key==='sound')NOTIF_SOUND_ENABLED=!!cb.checked;saveAppPrefs();toast((cb.checked?'Activé':'Désactivé')+' ✓');render();}
function requestSystemNotifications(){
  if(!('Notification' in window)){toast('Notifications système non supportées');return;}
  Notification.requestPermission().then(function(p){APP_PREFS.system=(p==='granted');saveAppPrefs();toast(p==='granted'?'Notifications système activées':'Permission refusée');render();});
}
function showInAppNotification(title,body){
  if(APP_PREFS.inapp===false)return;
  var el=document.getElementById('push-notif');
  if(!el){el=document.createElement('div');el.id='push-notif';el.className='push-notif';document.body.appendChild(el);}
  el.innerHTML='<div class="push-notif-title">'+escHtml(title)+'</div><div class="push-notif-body">'+escHtml(body)+'</div>';
  el.classList.add('show');
  clearTimeout(window._pushT);window._pushT=setTimeout(function(){if(!APP_PREFS.keepInApp)el.remove();else el.classList.remove('show');},4200);
}
function sendSmartNotification(title,body){
  showInAppNotification(title,body);
  if(APP_PREFS.system&&'Notification' in window&&Notification.permission==='granted'){
    try{new Notification(title,{body:body,tag:'braou-pilot'});}catch(e){}
  }
}
function playMelody(notes,volume){
  if(!NOTIF_SOUND_ENABLED||APP_PREFS.sound===false)return;
  try{var ctx=getAudioCtx();notes.forEach(function(n,i){var osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=n.type||'sine';osc.frequency.setValueAtTime(n.f,ctx.currentTime+i*.09);gain.gain.setValueAtTime(0,ctx.currentTime+i*.09);gain.gain.linearRampToValueAtTime(volume||.18,ctx.currentTime+i*.09+.015);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.09+(n.d||.18));osc.start(ctx.currentTime+i*.09);osc.stop(ctx.currentTime+i*.09+(n.d||.2));});}catch(e){}
}

playDoneSound=function(){playMelody([{f:523,type:'sine'},{f:659,type:'sine'},{f:784,type:'sine'},{f:1046,type:'triangle',d:.24}],.14);};

function saveEmail(){var el=document.getElementById('edit-email');if(!el)return;var val=el.value.trim();if(!val){toast('Identifiant vide');return;}if(USERS.some(function(u){return u.email===val&&u.id!==currentUser.id;})){toast('Identifiant déjà utilisé');return;}currentUser.email=val;var u=USERS.find(function(x){return x.id===currentUser.id;});if(u)u.email=val;save();toast('Identifiant mis à jour ✓');render();}
function savePassword(){var old=document.getElementById('old-pass'),np=document.getElementById('new-pass1'),cf=document.getElementById('new-pass2');if(!old||!np||!cf)return;var u=USERS.find(function(x){return x.id===currentUser.id;});if(!u)return;if(old.value!==u.password){toast('Ancien mot de passe incorrect');return;}if(np.value.length<4){toast('Mot de passe trop court');return;}if(np.value!==cf.value){toast('Confirmation différente');return;}u.password=np.value;currentUser.password=np.value;save();toast('Mot de passe modifié ✓');render();}
renderProfil=function(){
  loadAppPrefs();var u=currentUser;var lbl={admin:'Admin',responsable:'Responsable',menage:'Ménage',technique:'Technique',accueil:'Accueil'};
  var av=u.photo?'<img src="'+u.photo+'" alt=""/><div class="profil-av-ov"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2l2-3h10l2 3a2 2 0 0 0 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>':'<span>'+escHtml(u.nom.slice(0,2).toUpperCase())+'</span><div class="profil-av-ov"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2l2-3h10l2 3a2 2 0 0 0 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>';
  var h='<div class="page-hd"><div class="page-title">⚙ Paramètres</div></div>';
  h+='<div class="profil-hero"><div class="profil-av" onclick="triggerPhoto(\''+u.id+'\')">'+av+'</div><div class="profil-name">'+escHtml(u.nom)+'</div><div class="profil-role-badge">'+(lbl[u.role]||u.role)+'</div></div>';
  h+='<div class="profil-card"><div class="profil-card-title">Compte</div>';
  h+='<div class="field"><label>Nom affiché</label><div class="edit-row"><input class="form-in" id="edit-nom" value="'+escHtml(u.nom)+'"/><button class="btn-ok" onclick="saveName()">OK</button></div></div>';
  h+='<div class="field"><label>Identifiant / email</label><div class="edit-row"><input class="form-in" id="edit-email" value="'+escHtml(u.email)+'"/><button class="btn-ok" onclick="saveEmail()">OK</button></div></div>';
  h+='<div class="field"><label>Mot de passe</label><input class="form-in" id="old-pass" type="password" placeholder="Ancien mot de passe"/><input class="form-in" id="new-pass1" type="password" placeholder="Nouveau mot de passe" style="margin-top:7px"/><div class="edit-row" style="margin-top:7px"><input class="form-in" id="new-pass2" type="password" placeholder="Confirmer"/><button class="btn-ok" onclick="savePassword()">OK</button></div></div></div>';
  function sw(key,title,desc,checked){return '<div class="settings-row"><div><div class="settings-row-title">'+title+'</div><div class="settings-row-desc">'+desc+'</div></div><div class="toggle-wrap"><input type="checkbox" id="pref-'+key+'" '+(checked?'checked':'')+' onchange="togglePref(\''+key+'\',this)"/><label class="toggle-lbl" for="pref-'+key+'"></label></div></div>';}
  h+='<div class="profil-card"><div class="profil-card-title">Notifications et expérience</div>';
  h+=sw('sound','Sons de notification','Son plus doux pour urgence, nouvelle tâche et tâche terminée.',APP_PREFS.sound!==false);
  h+=sw('inapp','Notifications in-app','Bannière dans l’application comme une vraie app mobile.',APP_PREFS.inapp!==false);
  h+=sw('keepInApp','Conserver les bannières','Si désactivé, elles disparaissent complètement après affichage.',APP_PREFS.keepInApp!==false);
  h+=sw('dog','Animation du chien','Félicitation visuelle quand une tâche est accomplie.',APP_PREFS.dog!==false);
  var perm=('Notification' in window)?Notification.permission:'non supporté';
  h+='<div class="settings-row"><div><div class="settings-row-title">Push système téléphone</div><div class="settings-row-desc">Statut : '+perm+'. Fonctionne surtout quand l’app est ouverte ou installée en PWA selon le navigateur.</div></div><button class="btn-ok" onclick="requestSystemNotifications()">Activer</button></div>';
  h+='<div class="settings-actions"><button class="btn-add" onclick="sendSmartNotification(\'Test notification\',\'Les notifications sont opérationnelles.\')">Tester notification</button><button class="btn-ok" onclick="playDoneSound()">Tester son</button></div></div>';
  return h;
};
function flattenTasks(){var arr=[];['menage','technique','accueil'].forEach(function(m){(TASKS[m]||[]).forEach(function(t){t._module=m;arr.push(t);});});return arr;}
function avgMs(arr){return arr.length?arr.reduce(function(s,x){return s+x;},0)/arr.length:0;}
function pct(n,d){return d?Math.round(n/d*100):0;}
function barRows(items,max,labelFn,valFn,colorFn){if(!items.length)return '<p style="font-size:12px;color:var(--text3)">Pas encore assez de données.</p>';max=max||1;return items.map(function(it){var v=valFn(it),w=Math.max(3,Math.round(v/max*100));return '<div class="bar-row-pro"><div class="bar-name">'+labelFn(it)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+(colorFn?colorFn(it):'var(--primary)')+'">'+(w>20?v:'')+'</div></div><div class="bar-count">'+v+'</div></div>';}).join('');}
renderStats=function(){
  var all=flattenTasks(),done=all.filter(function(t){return t.done;}),todo=all.filter(function(t){return !t.done;}),now=Date.now();
  var late=todo.filter(function(t){return now-(t.created_at||now)>86400000;}),urgentOpen=todo.filter(function(t){return t.priorite==='urgent';});
  var urgentDone=done.filter(function(t){return t.priorite==='urgent'&&t.done_at;}),avgUrg=avgMs(urgentDone.map(function(t){return t.done_at-t.created_at;}));
  var avgAll=avgMs(done.filter(function(t){return t.done_at;}).map(function(t){return t.done_at-t.created_at;}));
  var h='<div class="page-hd"><div class="page-title">📊 Suivi pilotage</div></div>';
  h+='<div class="kpi-grid-pro"><div class="kpi-card-pro"><div class="kpi-label">Tâches terminées</div><div class="kpi-value">'+done.length+'/'+all.length+'</div><div class="kpi-hint">Taux global : '+pct(done.length,all.length)+'%</div></div>';
  h+='<div class="kpi-card-pro"><div class="kpi-label">Retard +24h</div><div class="kpi-value" style="color:var(--danger)">'+late.length+'</div><div class="kpi-hint">Non faites depuis plus de 24h</div></div>';
  h+='<div class="kpi-card-pro"><div class="kpi-label">Urgentes ouvertes</div><div class="kpi-value">'+urgentOpen.length+'</div><div class="kpi-hint">À traiter en priorité</div></div>';
  h+='<div class="kpi-card-pro"><div class="kpi-label">Délai moyen urgent</div><div class="kpi-value" style="font-size:20px">'+(avgUrg?formatDur(avgUrg):'—')+'</div><div class="kpi-hint">Création → traitement</div></div></div>';
  var insights=[]; if(late.length)insights.push('Retard détecté : '+late.length+' tâche(s) dépassent 24h.'); if(avgUrg>7200000)insights.push('Les urgences prennent plus de 2h en moyenne : levier de réactivité.'); if(todo.length&&urgentOpen.length/todo.length>.35)insights.push('Part élevée d’urgences ouvertes : vérifier la qualification des priorités.'); if(!insights.length)insights.push('Aucune faille majeure détectée avec les données actuelles.');
  h+='<div class="insight-card"><b>🔎 Diagnostic automatique</b><ul>'+insights.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul></div>';
  var agentMap={};all.forEach(function(t){var k=t.agent_id||'non_attribue',n=getAgentLabel(t);if(!agentMap[k])agentMap[k]={id:k,nom:n,total:0,done:0,todo:0,urgent:0,late:0};agentMap[k].total++;if(t.done)agentMap[k].done++;else agentMap[k].todo++;if(!t.done&&t.priorite==='urgent')agentMap[k].urgent++;if(!t.done&&now-(t.created_at||now)>86400000)agentMap[k].late++;});
  var agents=Object.values(agentMap).sort(function(a,b){return (b.todo+b.urgent*2+b.late*2)-(a.todo+a.urgent*2+a.late*2);});
  h+='<div class="chart-card"><div class="chart-title">👥 Charge par agent / pôle</div>'+barRows(agents,Math.max.apply(null,agents.map(function(a){return a.todo+a.urgent*2+a.late*2;}).concat([1])),function(a){return escHtml(a.nom);},function(a){return a.todo+a.urgent*2+a.late*2;},function(a){return a.late?'var(--danger)':a.urgent?'var(--warn)':'var(--primary)';})+'<div style="font-size:11px;color:var(--text3);margin-top:8px">Score = tâches ouvertes + urgences pondérées + retards pondérés.</div></div>';
  var hours={};all.forEach(function(t){var d=new Date(t.created_at||now),k=d.getHours();hours[k]=(hours[k]||0)+1;});var hourItems=Object.keys(hours).map(function(k){return {h:k,v:hours[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,8);
  h+='<div class="chart-card"><div class="chart-title">🕒 Heures de pointe</div>'+barRows(hourItems,Math.max.apply(null,hourItems.map(function(x){return x.v;}).concat([1])),function(x){return x.h+'h - '+(parseInt(x.h)+1)+'h';},function(x){return x.v;})+'</div>';
  var cleanByNum={},cleanByType={};done.forEach(function(t){if(!(t.logement_num||t.logement_type)||!t.done_at)return;if(t.preset==='nettoyage'||/nettoy/i.test(t.texte)){var ms=t.done_at-t.created_at;if(t.logement_num){var kn=t.logement_num;if(!cleanByNum[kn])cleanByNum[kn]={num:kn,type:t.logement_type,times:[]};cleanByNum[kn].times.push(ms);}if(t.logement_type){if(!cleanByType[t.logement_type])cleanByType[t.logement_type]={type:t.logement_type,times:[]};cleanByType[t.logement_type].times.push(ms);}}});
  var byNum=Object.values(cleanByNum).map(function(x){x.avg=avgMs(x.times);return x;}).sort(function(a,b){return b.avg-a.avg;}).slice(0,8);var maxClean=Math.max.apply(null,byNum.map(function(x){return x.avg;}).concat([1]));
  h+='<div class="chart-card"><div class="chart-title">🧹 Temps moyen de nettoyage par logement</div>'+barRows(byNum,maxClean,function(x){var info=LOGEMENT_TYPES[x.type]||{emoji:'📍'};return info.emoji+' n°'+x.num;},function(x){return formatDur(x.avg);},function(x){return (LOGEMENT_TYPES[x.type]||{}).color||'var(--primary)';})+'</div>';
  var attrib={};all.forEach(function(t){if(t.logement_num){var k=t.logement_num;if(!attrib[k])attrib[k]={num:k,type:t.logement_type,total:0,done:0};attrib[k].total++;if(t.done)attrib[k].done++;}});var attribItems=Object.values(attrib).sort(function(a,b){return b.total-a.total;}).slice(0,10);var maxAttrib=Math.max.apply(null,attribItems.map(function(x){return x.total;}).concat([1]));
  h+='<div class="chart-card"><div class="chart-title">🏠 Logements / numéros les plus attribués</div>'+barRows(attribItems,maxAttrib,function(x){var info=LOGEMENT_TYPES[x.type]||{emoji:'📍'};return info.emoji+' n°'+x.num;},function(x){return x.total;},function(x){return (LOGEMENT_TYPES[x.type]||{}).color||'var(--primary)';})+'</div>';
  var typeItems=Object.keys(cleanByType).map(function(k){var info=LOGEMENT_TYPES[k]||{emoji:'📍',label:k};return {label:info.emoji+' '+info.label,v:formatDur(avgMs(cleanByType[k].times)),raw:avgMs(cleanByType[k].times),color:info.color};}).sort(function(a,b){return b.raw-a.raw;});
  h+='<div class="chart-card"><div class="chart-title">🏕 Temps de nettoyage par type</div>'+barRows(typeItems,Math.max.apply(null,typeItems.map(function(x){return x.raw;}).concat([1])),function(x){return x.label;},function(x){return x.v;},function(x){return x.color||'var(--primary)';})+'</div>';
  var modules=[{k:'menage',l:'Ménage',e:'🧹'},{k:'technique',l:'Technique',e:'🔧'},{k:'accueil',l:'Accueil',e:'🛎'}];
  h+='<div class="chart-card"><div class="chart-title">📌 Taux de complétion par service</div>'+barRows(modules,100,function(m){return m.e+' '+m.l;},function(m){var mt=TASKS[m.k]||[];return pct(mt.filter(function(t){return t.done;}).length,mt.length)+'%';},function(m){return 'var(--primary)';})+'</div>';
  return h;
};
// sécurise les anciens commentaires avec nom de compte et notification
var _oldSaveNote=typeof saveNote==='function'?saveNote:null;if(_oldSaveNote){saveNote=function(id){_oldSaveNote(id);var t=findTask(id);if(t)sendSmartNotification('Nouveau message',currentUser.nom+' a commenté : '+t.texte);};}
var _oldSaveReply=typeof saveReply==='function'?saveReply:null;if(_oldSaveReply){saveReply=function(tid,cid){_oldSaveReply(tid,cid);var t=findTask(tid);if(t)sendSmartNotification('Nouvelle réponse',currentUser.nom+' a répondu sous : '+t.texte);};}
loadAppPrefs();

</script>

<script id="braou-suivi-v4">
(function(){
/* ===== SUIVI V4 — Tableau de pilotage avancé ===== */
function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function allT(){var a=[];['menage','technique','accueil'].forEach(function(m){((window.TASKS&&TASKS[m])||[]).forEach(function(t){if(!t._module)t._module=m;a.push(t);});});return a;}
function avg(a){return a&&a.length?a.reduce(function(s,x){return s+x;},0)/a.length:0;}
function pct(n,d){return d?Math.round(n*100/d):0;}
function dur(ms){if(!ms||ms<0)return '—';var m=Math.round(ms/60000);if(m<1)return '<1m';if(m<60)return m+'m';var h=Math.floor(m/60),r=m%60;return h+'h'+(r?r+'m':'');}
function typeL(t){var inf=window.LOGEMENT_TYPES&&LOGEMENT_TYPES[t];return inf?(inf.emoji+' '+inf.label):(t||'N/A');}
function typeC(t){var inf=window.LOGEMENT_TYPES&&LOGEMENT_TYPES[t];return inf&&inf.color?inf.color:'linear-gradient(90deg,#38a3a5,#57cc99)';}
function agL(id){if(!id)return 'Non attribué';if(String(id).indexOf('pole_')===0){var m=id.replace('pole_','');return(window.POLES&&POLES[m])||m;}var u=(window.USERS||[]).find(function(x){return x.id===id;});return u?u.nom:'Inconnu';}
function timeAgoShort(ts){var d=(Date.now()-ts)/1000;if(d<60)return 'il y a <1m';if(d<3600)return 'il y a '+Math.round(d/60)+'m';if(d<86400)return 'il y a '+Math.round(d/3600)+'h';return 'il y a '+Math.round(d/86400)+'j';}

/* SVG sparkline: points = array of [x,y] normalized 0-1 */
function svgLine(pts,w,h,color,fill){
  if(!pts||pts.length<2)return '';
  var poly=pts.map(function(p,i){return (i===0?'M':'L')+(p[0]*w)+','+(h-p[1]*h*0.85-h*0.07);}).join(' ');
  var fillPoly=poly+' L'+(pts[pts.length-1][0]*w)+','+h+' L'+(pts[0][0]*w)+','+h+' Z';
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="overflow:visible">'
    +(fill?'<path d="'+fillPoly+'" fill="'+color+'" fill-opacity=".12"/>':'')
    +'<path d="'+poly+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

/* Bar block */
function barBlock(items){
  if(!items.length)return '<div class="sv4-no-data">Pas encore assez de données.</div>';
  var maxR=Math.max.apply(null,items.map(function(x){return x.raw||0;}).concat([1]));
  return '<div class="sv4-bars">'+items.map(function(x){
    var w=Math.max(4,Math.round((x.raw||0)/maxR*100));
    return '<div class="sv4-bar-row">'
      +'<div class="sv4-bar-label" title="'+esc(x.label)+'">'+esc(x.label)+'</div>'
      +'<div class="sv4-bar-track"><div class="sv4-bar-fill" style="width:'+w+'%;background:'+x.color+'">'+(w>28?esc(x.val):'')+'</div></div>'
      +'<div class="sv4-bar-val">'+esc(x.val)+'</div>'
      +'</div>';
  }).join('')+'</div>';
}

/* Card wrapper */
function card(title,sub,body,extra){
  return '<div class="sv4-card">'
    +'<div class="sv4-card-head"><b>'+title+'</b><span>'+esc(sub||'')+'</span></div>'
    +body+'</div>';
}

window.renderStats=function(){
  var all=allT(),now=Date.now();
  var done=all.filter(function(t){return t.done;});
  var todo=all.filter(function(t){return !t.done;});
  var doneT=done.filter(function(t){return t.done_at&&t.created_at;});
  var late=todo.filter(function(t){return now-(t.created_at||now)>86400000;});
  var urgent=todo.filter(function(t){return t.priorite==='urgent';});
  var urgDone=doneT.filter(function(t){return t.priorite==='urgent';});
  var clean=doneT.filter(function(t){return t.preset==='nettoyage'||/nettoy|ménage|menage/i.test(t.texte||'');});
  var avgAll=avg(doneT.map(function(t){return t.done_at-t.created_at;}));
  var avgUrg=avg(urgDone.map(function(t){return t.done_at-t.created_at;}));
  var avgClean=avg(clean.map(function(t){return t.done_at-t.created_at;}));
  var compRate=pct(done.length,all.length);
  var lateRate=pct(late.length,todo.length||1);
  var urgRate=pct(urgent.length,todo.length||1);
  var noAgent=todo.filter(function(t){return !t.agent_id||t.agent_id==='none';}).length;

  /* Score santé opérationnel */
  var health=Math.max(0,Math.min(100,Math.round(
    (all.length===0?50:compRate)
    -lateRate*1.6
    -urgRate*0.9
    -(avgUrg>7200000?15:0)
    -(noAgent>0?Math.min(15,noAgent*3):0)
  )));
  var healthColor=health>=70?'#57cc99':health>=40?'#ffd166':'#ff8a7a';

  var h='<div class="page-hd"><div class="page-title">📊 Suivi pilotage</div></div>';

  /* ─ HERO SCORE ─ */
  var heroClass=health>=70?'ok':health>=40?'warn':'bad';
  h+='<div class="sv4-hero" style="--sv4-score:'+health+'%">'
    +'<div class="sv4-hero-top">'
      +'<div class="sv4-score-ring"><div class="sv4-score-num">'+health+'</div></div>'
      +'<div class="sv4-hero-title"><h2>Score de pilotage</h2>'
        +'<p>Taux de réalisation, retards, urgences et attribution. Se met à jour automatiquement selon vos tâches.</p>'
      +'</div>'
    +'</div>'
    +'<div class="sv4-kpi-row">'
      +'<div class="sv4-kpi '+(compRate>=70?'ok':compRate>=40?'warn':'bad')+'">'
        +'<div class="sv4-kpi-v">'+compRate+'%</div><div class="sv4-kpi-l">Réalisé</div>'
      +'</div>'
      +'<div class="sv4-kpi '+(late.length===0?'ok':late.length<3?'warn':'bad')+'">'
        +'<div class="sv4-kpi-v">'+late.length+'</div><div class="sv4-kpi-l">Retards</div>'
      +'</div>'
      +'<div class="sv4-kpi '+(urgent.length===0?'ok':urgent.length<3?'warn':'bad')+'">'
        +'<div class="sv4-kpi-v">'+urgent.length+'</div><div class="sv4-kpi-l">Urgences</div>'
      +'</div>'
      +'<div class="sv4-kpi '+(noAgent===0?'ok':noAgent<3?'warn':'bad')+'">'
        +'<div class="sv4-kpi-v">'+noAgent+'</div><div class="sv4-kpi-l">Non attrib.</div>'
      +'</div>'
    +'</div>'
  +'</div>';

  /* ─ RATIOS CLÉS ─ */
  h+='<div class="sv4-sep">📐 Ratios clés</div>';
  var tasksPerDoneDay=doneT.length;
  var tasksLastWeek=all.filter(function(t){return now-(t.created_at||now)<7*86400000;}).length;
  var doneLastWeek=doneT.filter(function(t){return now-(t.done_at||0)<7*86400000;}).length;
  var weeklyVelo=doneLastWeek; // tâches terminées cette semaine
  var avgAgentLoad=all.length>0?(all.length/Math.max(1,(window.USERS||[]).filter(function(u){return u.role!=='admin'&&u.role!=='responsable';}).length)).toFixed(1):'—';
  h+='<div class="sv4-ratio-grid">'
    +'<div class="sv4-ratio"><div class="sv4-ratio-v">'+dur(avgAll)+'</div><div class="sv4-ratio-l">Délai moyen toutes tâches</div>'
      +'<div class="sv4-ratio-trend neutral">⏱ création → fin</div></div>'
    +'<div class="sv4-ratio"><div class="sv4-ratio-v">'+dur(avgUrg)+'</div><div class="sv4-ratio-l">Délai moyen urgent</div>'
      +'<div class="sv4-ratio-trend '+(avgUrg&&avgUrg<3600000?'up':avgUrg>7200000?'down':'neutral')+'">'+(avgUrg>7200000?'⚠ lent':avgUrg&&avgUrg<3600000?'✓ rapide':'—')+'</div></div>'
    +'<div class="sv4-ratio"><div class="sv4-ratio-v">'+dur(avgClean)+'</div><div class="sv4-ratio-l">Tps moy. nettoyage</div>'
      +'<div class="sv4-ratio-trend neutral">🧹 logements terminés</div></div>'
    +'<div class="sv4-ratio"><div class="sv4-ratio-v">'+weeklyVelo+'</div><div class="sv4-ratio-l">Vélocité semaine</div>'
      +'<div class="sv4-ratio-trend '+(weeklyVelo>=tasksLastWeek?'up':weeklyVelo>0?'warn':'down')+'">'+tasksLastWeek+' créées ce sem.</div></div>'
  +'</div>';

  /* ─ DIAGNOSTIC ─ */
  var diags=[];
  if(late.length>2) diags.push({cls:'sv4-danger',icon:'⚠️',txt:late.length+' tâche(s) en retard >24h. Réattribuer ou traiter en priorité.'});
  else if(late.length>0) diags.push({cls:'sv4-warn',icon:'⏰',txt:late.length+' tâche(s) en attente depuis plus de 24h.'});
  if(urgent.length>=3) diags.push({cls:'sv4-danger',icon:'🔥',txt:urgent.length+' urgences ouvertes. Risque de saturation opérationnelle.'});
  if(noAgent>2) diags.push({cls:'sv4-warn',icon:'👤',txt:noAgent+' tâches sans responsable assigné — risque de non-traitement.'});
  if(avgUrg>7200000) diags.push({cls:'sv4-warn',icon:'⏱',txt:'Le délai moyen de traitement urgent dépasse 2h. Revoir le flux d\'alerte.'});
  // Find overloaded agents
  var agLoad={};all.forEach(function(t){var k=t.agent_id||'non_att';agLoad[k]=(agLoad[k]||0)+(t.done?0:1);});
  var maxLoad=Math.max.apply(null,Object.values(agLoad).concat([0]));
  if(maxLoad>6){var overAg=Object.keys(agLoad).find(function(k){return agLoad[k]===maxLoad;});diags.push({cls:'sv4-warn',icon:'👥',txt:esc(agL(overAg))+' a '+maxLoad+' tâches ouvertes. Risque de surcharge — redistribuer.'});}
  // Check clean time anomalies
  var cleanByNum={};clean.forEach(function(t){if(!t.logement_num)return;var k=t.logement_num;if(!cleanByNum[k])cleanByNum[k]=[];cleanByNum[k].push(t.done_at-t.created_at);});
  var slowLogs=Object.keys(cleanByNum).filter(function(k){return avg(cleanByNum[k])>4*3600000;});
  if(slowLogs.length>0) diags.push({cls:'sv4-warn',icon:'🧹',txt:slowLogs.length+' logement(s) prennent en moyenne plus de 4h à nettoyer : n°'+slowLogs.slice(0,3).join(', ')+'.'});
  if(compRate>=80&&late.length===0&&urgent.length===0) diags.push({cls:'sv4-good',icon:'✅',txt:'Excellent niveau opérationnel. Tout roule !'});
  else if(diags.length===0) diags.push({cls:'sv4-good',icon:'👍',txt:'Aucun signal bloquant détecté sur les données actuelles.'});

  h+='<div class="sv4-diag"><div class="sv4-diag-title">🔎 Diagnostic automatique</div><div class="sv4-diag-items">'
    +diags.map(function(d){return '<div class="sv4-diag-item '+d.cls+'"><div class="sv4-diag-icon">'+d.icon+'</div><div>'+d.txt+'</div></div>';}).join('')
  +'</div></div>';

  /* ─ PERFORMANCE PAR PÔLE ─ */
  h+='<div class="sv4-sep">🏢 Par pôle</div>';
  var mods=['menage','technique','accueil'].map(function(m){
    var mt=all.filter(function(t){return t._module===m;});
    var dn=mt.filter(function(t){return t.done;}).length;
    var lt=mt.filter(function(t){return !t.done&&now-(t.created_at||now)>86400000;}).length;
    var ur=mt.filter(function(t){return !t.done&&t.priorite==='urgent';}).length;
    var rt=pct(dn,mt.length);
    return{m:m,label:(window.POLES&&POLES[m])||m,total:mt.length,done:dn,late:lt,urgent:ur,rate:rt,raw:mt.length,color:lt?'linear-gradient(90deg,#d94d35,#ffb199)':rt>=75?'linear-gradient(90deg,#4f9f64,#a4d983)':'linear-gradient(90deg,#e99a30,#ffd166)',val:rt+'% · '+lt+' retard'+(lt>1?'s':'')};
  });
  h+=card('🧭 Volume & avancement par pôle','créées, terminées, retards',barBlock(mods));

  /* ─ CHARGE PAR AGENT ─ */
  h+='<div class="sv4-sep">👥 Agents</div>';
  var agMap={};
  all.forEach(function(t){
    var id=t.agent_id||'non_att';
    if(!agMap[id])agMap[id]={id:id,nom:agL(id),total:0,done:0,todo:0,urgent:0,late:0,times:[]};
    agMap[id].total++;
    if(t.done){agMap[id].done++;if(t.done_at&&t.created_at)agMap[id].times.push(t.done_at-t.created_at);}
    else{agMap[id].todo++;if(t.priorite==='urgent')agMap[id].urgent++;if(now-(t.created_at||now)>86400000)agMap[id].late++;}
  });
  var agents=Object.values(agMap).sort(function(a,b){return (b.todo+b.urgent*2+b.late*3)-(a.todo+a.urgent*2+a.late*3);});
  var maxTodo=Math.max.apply(null,agents.map(function(a){return a.todo;}).concat([1]));
  h+='<div class="sv4-agents">'+agents.slice(0,12).map(function(a){
    var score=a.todo+a.urgent*2+a.late*3;
    var overloaded=score>6;
    var loadW=Math.round(a.todo/maxTodo*100);
    var avgTime=avg(a.times);
    return '<div class="sv4-agent-card'+(overloaded?' overloaded':'')+'">'
      +'<div class="sv4-agent-name">'+esc(a.nom)+'</div>'
      +'<div class="sv4-agent-stats">'
        +'<div class="sv4-agent-stat"><span class="sv4-agent-stat-lbl">En cours</span><span class="sv4-agent-stat-val '+(a.todo>5?'bad':a.todo>3?'warn':'ok')+'">'+a.todo+'</span></div>'
        +'<div class="sv4-agent-stat"><span class="sv4-agent-stat-lbl">Terminées</span><span class="sv4-agent-stat-val">'+a.done+'</span></div>'
        +(a.urgent?'<div class="sv4-agent-stat"><span class="sv4-agent-stat-lbl">Urgences</span><span class="sv4-agent-stat-val bad">'+a.urgent+'</span></div>':'')
        +(a.late?'<div class="sv4-agent-stat"><span class="sv4-agent-stat-lbl">Retards</span><span class="sv4-agent-stat-val bad">'+a.late+'</span></div>':'')
        +(avgTime?'<div class="sv4-agent-stat"><span class="sv4-agent-stat-lbl">Temps moy.</span><span class="sv4-agent-stat-val">'+dur(avgTime)+'</span></div>':'')
      +'</div>'
      +'<div class="sv4-load-bar"><div class="sv4-load-fill'+(overloaded?' hot':a.todo>3?' warn':'')+'" style="width:'+loadW+'%"></div></div>'
    +'</div>';
  }).join('')+'</div>';

  /* ─ NETTOYAGES PAR LOGEMENT ─ */
  h+='<div class="sv4-sep">🧹 Nettoyage</div>';
  h+='<div class="sv4-two">';

  /* Top logements les plus longs */
  var cleanNum={};
  clean.forEach(function(t){
    if(!t.logement_num)return;
    var k=(t.logement_type||'')+':'+t.logement_num;
    if(!cleanNum[k])cleanNum[k]={type:t.logement_type,num:t.logement_num,times:[],count:0};
    cleanNum[k].times.push(t.done_at-t.created_at);
    cleanNum[k].count++;
  });
  var cn=Object.values(cleanNum).map(function(x){x.avg=avg(x.times);return x;}).sort(function(a,b){return b.avg-a.avg;}).slice(0,8);
  var cnItems=cn.map(function(x){return{label:typeL(x.type)+' n°'+x.num,raw:x.avg,val:dur(x.avg)+' · '+x.count+'×',color:typeC(x.type)};});
  h+=card('⏱ Logements les plus longs à nettoyer','levier : état, distance, équipement',barBlock(cnItems));

  /* Temps moyen par type */
  var cleanType={};
  clean.forEach(function(t){var k=t.logement_type||'?';if(!cleanType[k])cleanType[k]={type:k,times:[],count:0};cleanType[k].times.push(t.done_at-t.created_at);cleanType[k].count++;});
  var ct=Object.values(cleanType).map(function(x){x.avg=avg(x.times);return x;}).sort(function(a,b){return b.avg-a.avg;});
  var ctItems=ct.map(function(x){return{label:typeL(x.type),raw:x.avg,val:dur(x.avg)+' · '+x.count+'×',color:typeC(x.type)};});
  h+=card('🏕 Temps moyen par type de logement','comparer MH, bungalow, lodge, emplacement…',barBlock(ctItems));

  h+='</div>';

  /* ─ LOGEMENTS SOLLICITÉS ─ */
  h+='<div class="sv4-sep">🏠 Logements</div>';
  h+='<div class="sv4-two">';

  var attr={};
  all.forEach(function(t){
    if(!t.logement_num)return;
    var k=(t.logement_type||'')+':'+t.logement_num;
    if(!attr[k])attr[k]={type:t.logement_type,num:t.logement_num,total:0,urgent:0,late:0,done:0,score:0};
    attr[k].total++;
    if(t.priorite==='urgent')attr[k].urgent++;
    if(t.done)attr[k].done++;
    if(!t.done&&now-(t.created_at||now)>86400000)attr[k].late++;
  });
  Object.values(attr).forEach(function(x){x.score=x.total+x.urgent*1.5+x.late*2;});
  var attrSorted=Object.values(attr).sort(function(a,b){return b.score-a.score;}).slice(0,8);
  var attrItems=attrSorted.map(function(x){return{label:typeL(x.type)+' n°'+x.num,raw:x.score,val:x.total+'×',color:x.late?'linear-gradient(90deg,#d94d35,#ffb199)':typeC(x.type)};});
  h+=card('🏠 Logements les plus sollicités','fréquence × urgences × retards',barBlock(attrItems));

  /* Logements à incidents (urgence ou retard) */
  var incidents=Object.values(attr).filter(function(x){return x.urgent>0||x.late>0;}).sort(function(a,b){return (b.urgent+b.late)-(a.urgent+a.late);}).slice(0,8);
  var incItems=incidents.map(function(x){return{label:typeL(x.type)+' n°'+x.num,raw:x.urgent+x.late,val:x.urgent+'U '+x.late+'R',color:'linear-gradient(90deg,#e85d3f,#ffc18b)'};});
  h+=card('🔥 Logements à incidents','urgences + retards par numéro',barBlock(incItems));

  h+='</div>';

  /* ─ FLUX TEMPORELS ─ */
  h+='<div class="sv4-sep">📅 Temporel</div>';
  h+='<div class="sv4-two">';

  /* Flux 7 jours (ligne svg) */
  var days7=[];for(var i=6;i>=0;i--){var dd=new Date(now-i*86400000);days7.push({key:dd.toISOString().slice(0,10),lbl:dd.toLocaleDateString('fr-FR',{weekday:'short'}),created:0,done:0});}
  all.forEach(function(t){var c=new Date(t.created_at||now).toISOString().slice(0,10);var dd=days7.find(function(d){return d.key===c;});if(dd)dd.created++;if(t.done_at){var dc=new Date(t.done_at).toISOString().slice(0,10);var dd2=days7.find(function(d){return d.key===dc;});if(dd2)dd2.done++;}});
  var maxD7=Math.max.apply(null,days7.map(function(d){return Math.max(d.created,d.done);}).concat([1]));
  var ptsCreated=days7.map(function(d,i){return[i/6,(d.created||0)/maxD7];});
  var ptsDone=days7.map(function(d,i){return[i/6,(d.done||0)/maxD7];});
  h+=card('📅 Flux 7 jours','créées (bleu) vs terminées (vert)',
    '<div class="sv4-trend-wrap">'+svgLine(ptsCreated,280,70,'#38a3a5',true)+svgLine(ptsDone,280,70,'#2a9d5c',true)+'</div>'
    +'<div class="sv4-trend-labels">'+days7.map(function(d){return '<span>'+esc(d.lbl)+'</span>';}).join('')+'</div>'
    +'<div class="sv4-bars" style="margin-top:10px">'+days7.map(function(d){
      var w1=Math.round((d.created||0)/maxD7*100), w2=Math.round((d.done||0)/maxD7*100);
      return '<div style="display:flex;gap:4px;align-items:center"><div style="font-size:9px;color:var(--text3);width:22px;text-align:right">'+esc(d.lbl)+'</div>'
        +'<div style="flex:1;height:10px;background:#f0ece5;border-radius:99px;overflow:hidden;position:relative">'
          +'<div style="height:50%;border-radius:3px;background:#38a3a5;width:'+w1+'%"></div>'
          +'<div style="height:50%;border-radius:3px;background:#2a9d5c;width:'+w2+'%"></div>'
        +'</div>'
        +'<div style="font-size:9px;color:var(--text3);width:26px">'+d.done+'/'+d.created+'</div></div>';
    }).join('')+'</div>');

  /* Heures de pointe */
  var hours=[];for(var ih=0;ih<24;ih++)hours.push({h:ih,v:0});
  all.forEach(function(t){hours[new Date(t.created_at||now).getHours()].v++;});
  var maxH=Math.max.apply(null,hours.map(function(x){return x.v;}).concat([1]));
  var avgH=avg(hours.map(function(x){return x.v;}));
  h+=card('🕒 Heures de pointe','quand les demandes arrivent',
    '<div class="sv4-hours">'+hours.map(function(x){
      var pct2=Math.max(3,Math.round(x.v/maxH*100));
      var cls=x.v>avgH*1.8?'peak':x.v>avgH*1.2?'medium':'';
      return '<div class="sv4-hour-bar '+cls+'" style="height:'+pct2+'%" title="'+x.h+'h : '+x.v+' tâche(s)"></div>';
    }).join('')+'</div>'
    +'<div class="sv4-hour-tick"><span>0h</span><span>3h</span><span>6h</span><span>9h</span><span>12h</span><span>15h</span><span>18h</span><span>21h</span></div>');

  h+='</div>';

  /* ─ DISTRIBUTION DES DÉLAIS ─ */
  h+='<div class="sv4-sep">⏱ Délais</div>';
  var buckets=[
    {k:'<1h',min:0,max:3600000},
    {k:'1–3h',min:3600000,max:10800000},
    {k:'3–6h',min:10800000,max:21600000},
    {k:'6–24h',min:21600000,max:86400000},
    {k:'+24h',min:86400000,max:Infinity}
  ];
  buckets.forEach(function(b){b.count=doneT.filter(function(t){var d=t.done_at-t.created_at;return d>=b.min&&d<b.max;}).length;b.raw=b.count;b.val=b.count+'';b.color=b.k==='+24h'?'linear-gradient(90deg,#d94d35,#ffb199)':b.k==='+6h'?'linear-gradient(90deg,#e99a30,#ffd166)':'linear-gradient(90deg,#4f9f64,#a4d983)';b.label=b.k;});
  h+=card('⏱ Distribution des délais de traitement','repère si les tâches s\'accumulent',barBlock(buckets));

  /* ─ ATTRIBUTION ─ */
  h+='<div class="sv4-sep">🎯 Attribution</div>';
  h+='<div class="sv4-two">';

  /* Donut par module */
  var modColors={'menage':'#38a3a5','technique':'#f1a23a','accueil':'#9b59b6'};
  var totalTodo=todo.length||1;
  var modShares=['menage','technique','accueil'].map(function(m){
    var n=todo.filter(function(t){return t._module===m;}).length;
    return{m:m,n:n,pct:pct(n,totalTodo),color:modColors[m]||'#38a3a5',label:(window.POLES&&POLES[m])||m};
  });
  var coneStr='';var coneStart=0;
  modShares.forEach(function(ms){var deg=ms.pct*3.6;coneStr+=ms.color+' '+coneStart+'deg '+(coneStart+deg)+'deg,';coneStart+=deg;});
  coneStr=coneStr.replace(/,$/,'');
  h+=card('🔄 Répartition des tâches ouvertes','par pôle',
    '<div class="sv4-donut-wrap">'
      +'<div class="sv4-donut" style="background:conic-gradient('+coneStr+')">'
        +'<div class="sv4-donut-inner"><div class="sv4-donut-pct">'+totalTodo+'</div><div class="sv4-donut-lbl">ouvertes</div></div>'
      +'</div>'
      +'<div class="sv4-donut-legend">'+modShares.map(function(ms){
        return '<div class="sv4-legend-item"><div class="sv4-legend-dot" style="background:'+ms.color+'"></div>'+esc(ms.label)+' <b>'+ms.pct+'%</b></div>';
      }).join('')+'</div>'
    +'</div>');

  /* Tâches récurrentes */
  var recur=all.filter(function(t){return t.recur;});
  var recurDone=recur.filter(function(t){return t.done;});
  h+=card('🔁 Tâches récurrentes','tâches se recreant chaque matin',
    '<div class="sv4-ratio-grid" style="grid-template-columns:1fr 1fr 1fr">'
      +'<div class="sv4-ratio"><div class="sv4-ratio-v">'+recur.length+'</div><div class="sv4-ratio-l">Total récurrentes</div></div>'
      +'<div class="sv4-ratio"><div class="sv4-ratio-v">'+recurDone.length+'</div><div class="sv4-ratio-l">Complétées</div></div>'
      +'<div class="sv4-ratio"><div class="sv4-ratio-v">'+(recur.length>0?pct(recurDone.length,recur.length):0)+'%</div><div class="sv4-ratio-l">Taux de complétion</div></div>'
    +'</div>');

  h+='</div>';

  /* ─ JOURNAL RÉCENT ─ */
  h+='<div class="sv4-sep">📋 Activité récente</div>';
  var recent=doneT.slice().sort(function(a,b){return b.done_at-a.done_at;}).slice(0,10);
  if(recent.length){
    h+='<div class="sv4-card"><div class="sv4-card-head"><b>⚡ Dernières tâches terminées</b><span>mise à jour en temps réel</span></div>'
      +'<div class="sv4-log">'+recent.map(function(t){
        return '<div class="sv4-log-item">'
          +'<div class="sv4-log-time">'+timeAgoShort(t.done_at)+'</div>'
          +'<div class="sv4-log-agent">'+esc(agL(t.agent_id))+'</div>'
          +'<div class="sv4-log-txt">'+esc(t.texte||'')+'</div>'
          +'<div class="sv4-log-dur">'+dur(t.done_at-t.created_at)+'</div>'
        +'</div>';
      }).join('')+'</div></div>';
  }

  /* ─ MOTS-CLÉS RÉCURRENTS ─ */
  h+='<div class="sv4-sep">🔎 Sujets</div>';
  var words={};
  var stopwords=['pour','avec','dans','une','des','les','logement','tache','tâche','emplacement','mobile','home','suite','faire','plus','être','mais','tout','bien','comme','bungalow','lodge','chalets','chalet','cette','numero','numéro','tres','très','autre'];
  all.forEach(function(t){
    String(t.texte||'').toLowerCase().replace(/[^a-zàâéèêëïîôùûüç\s]/gi,' ').split(/\s+/).forEach(function(w){
      if(w.length<4||stopwords.indexOf(w)>=0)return;
      words[w]=(words[w]||0)+1;
    });
  });
  var wi=Object.keys(words).map(function(k){return{k:k,v:words[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,20);
  var maxW=wi.length?wi[0].v:1;
  h+='<div class="sv4-card"><div class="sv4-card-head"><b>🔎 Sujets récurrents dans les tâches</b><span>mots les plus fréquents</span></div>'
    +'<div class="sv4-tags">'+wi.map(function(x){
      var cls=x.v>=maxW*0.7?'big':x.v>=maxW*0.4?'medium':'';
      return '<span class="sv4-tag '+cls+'">'+esc(x.k)+' <b style="opacity:.6">'+x.v+'</b></span>';
    }).join('')+'</div></div>';

  return h;
};
})();
</script>


</body>
</html>
